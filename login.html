<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno - EEEFM Estudo e Trabalho</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f1f3f6;
}

.login-container{
max-width:400px;
margin:120px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
color:#0a2a66;
}

.login-container input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.login-container button{
width:100%;
margin-top:15px;
padding:12px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-container button:hover{
background:#1c4cb3;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Portal do Aluno</h2>

<input
id="cpf"
placeholder="Digite seu CPF"
maxlength="14"
oninput="formatarCPF(this)"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button onclick="loginAluno()">Entrar</button>

</div>


<script>

const API = "https://portal-escola-backend.onrender.com"

/* =========================
FORMATAR CPF
========================= */

function formatarCPF(campo){

let cpf=campo.value.replace(/\D/g,'')

cpf=cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf=cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf=cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")

campo.value=cpf

}

/* =========================
LOGIN ALUNO
========================= */

async function loginAluno(){

let cpf=document.getElementById("cpf").value.replace(/\D/g,'')
let senha=document.getElementById("senha").value

let res=await fetch(API + "/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
cpf:cpf,
senha:senha
})

})

let data=await res.json()

if(data.success){

localStorage.setItem("alunoID",data.aluno.id)

window.location="alunos.html"

}else{

alert("CPF ou senha incorretos")

}

}

</script>

</body>

</html>
