<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Aluno</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-container{
width:100%;
max-width:380px;
background:#020617;
padding:30px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 30px rgba(0,0,0,0.5);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
color:#38bdf8;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:white;
}

input:focus{
outline:none;
border-color:#38bdf8;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0284c7;
}

.loading{
opacity:0.6;
pointer-events:none;
}

.erro{
color:#ef4444;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<div class="login-container">
<h2>🎓 Portal do Aluno</h2>

<input id="cpf" placeholder="CPF" maxlength="14">
<input type="password" id="senha" placeholder="Senha">

<button id="btnLogin">Entrar</button>
<div id="erro" class="erro"></div>
</div>

<script>
const API="https://portal-escola-backend.onrender.com"

const btn = document.getElementById("btnLogin")
const erro = document.getElementById("erro")

// FORMATAR CPF
document.getElementById("cpf").addEventListener("input",(e)=>{
let cpf = e.target.value.replace(/\D/g,'')
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")
e.target.value = cpf
})

btn.onclick = loginAluno

async function loginAluno(){
erro.innerText=""
let cpf=document.getElementById("cpf").value.replace(/\D/g,'')
let senha=document.getElementById("senha").value

if(!cpf || !senha){
erro.innerText="Preencha todos os campos"
return
}

btn.classList.add("loading")
btn.innerText="Entrando..."

try{
let res=await fetch(API+"/login-aluno",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({cpf,senha})
})

let data=await res.json()

if(data.success){
localStorage.setItem("token",data.token)
localStorage.setItem("usuario",JSON.stringify(data.aluno))
window.location="aluno.html"
}else{
erro.innerText="CPF ou senha inválidos"
}

}catch{
erro.innerText="Erro de conexão com servidor"
}

btn.classList.remove("loading")
btn.innerText="Entrar"
}
</script>

</body>
</html>
