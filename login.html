<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno - EEEFM Estudo e Trabalho</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f1f3f6;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

/* HEADER */

header{
background:#0a2a66;
padding:15px 0;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
}

nav{
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.logo{
display:flex;
align-items:center;
gap:10px;
color:white;
}

.logo img{
width:45px;
}

.menu a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:500;
}

.menu a:hover{
text-decoration:underline;
}


/* LOGIN */

.login-container{
max-width:400px;
margin:120px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
color:#0a2a66;
}

.login-container input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.login-container button{
width:100%;
margin-top:15px;
padding:12px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-container button:hover{
background:#1c4cb3;
}

.link{
margin-top:15px;
display:block;
cursor:pointer;
color:#0a2a66;
}

</style>

</head>

<body>

<!-- HEADER / MENU -->

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="login.html">Portal do Aluno</a>
<a href="login-professor.html">Portal do Professor</a>
<a href="matricula.html">Matrícula</a>
</div>

</nav>

</div>

</header>


<!-- LOGIN -->

<div class="login-container" id="loginBox">

<h2>Portal do Aluno</h2>

<input
id="cpf"
placeholder="Digite seu CPF"
maxlength="14"
oninput="formatarCPF(this)"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button onclick="loginAluno()">Entrar</button>

<span class="link" onclick="abrirRecuperar()">Esqueci minha senha</span>

</div>



<!-- RECUPERAR SENHA -->

<div class="login-container" id="recuperarBox" style="display:none;">

<h2>Recuperar Senha</h2>

<input
id="cpfRecuperar"
placeholder="Digite seu CPF"
maxlength="14"
oninput="formatarCPF(this)"
>

<button onclick="recuperarSenha()">Continuar</button>

<span class="link" onclick="voltarLogin()">Voltar</span>

</div>



<!-- NOVA SENHA -->

<div class="login-container" id="novaSenhaBox" style="display:none;">

<h2>Nova Senha</h2>

<input
type="password"
id="novaSenha"
placeholder="Digite a nova senha"
>

<button onclick="redefinirSenha()">Salvar Nova Senha</button>

</div>



<script src="script.js"></script>

<script>

let cpfRecuperacao = ""


function abrirRecuperar(){

document.getElementById("loginBox").style.display="none"
document.getElementById("recuperarBox").style.display="block"

}


function voltarLogin(){

document.getElementById("recuperarBox").style.display="none"
document.getElementById("loginBox").style.display="block"

}


async function recuperarSenha(){

let cpf=document.getElementById("cpfRecuperar").value.replace(/\D/g,'')

if(!cpf){
alert("Digite seu CPF")
return
}

try{

let res=await fetch(API+"/recuperar-senha",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
cpf:cpf,
tipo:"aluno"
})

})

let data=await res.json()

if(data.success){

cpfRecuperacao=cpf

document.getElementById("recuperarBox").style.display="none"
document.getElementById("novaSenhaBox").style.display="block"

}else{

alert("CPF não encontrado")

}

}catch(err){

alert("Erro de conexão com servidor")

}

}


async function redefinirSenha(){

let senha=document.getElementById("novaSenha").value

if(!senha){
alert("Digite a nova senha")
return
}

try{

let res=await fetch(API+"/redefinir-senha",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
cpf:cpfRecuperacao,
novaSenha:senha,
tipo:"aluno"
})

})

let data=await res.json()

if(data.success){

alert("Senha alterada com sucesso!")

window.location="login.html"

}else{

alert("Erro ao redefinir senha")

}

}catch(err){

alert("Erro de conexão com servidor")

}

}

</script>

</body>
</html>
