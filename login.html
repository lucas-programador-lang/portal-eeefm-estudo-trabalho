<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Aluno</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* Mantido CSS original conforme solicitado */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#020617);min-height:100vh;}

header{
  background:#020617;
  padding:15px 0;
  border-bottom:1px solid #1e293b;
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
}

header .container{
  max-width:1200px;
  margin:auto;
  padding:0 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header .logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#38bdf8;
  font-weight:bold;
  font-size:18px;
}
header .logo img{width:45px;}

.menu{
  display:flex;
  gap:15px;
}

.menu a{
  color:#cbd5f5;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.menu a:hover{color:#38bdf8;}

.menu-toggle{
  display:none;
  font-size:24px;
  color:#38bdf8;
  cursor:pointer;
}

.login-container{
  width:100%;
  max-width:380px;
  background:#020617;
  padding:30px;
  border-radius:12px;
  border:1px solid #1e293b;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
  margin:150px auto 0 auto;
}

.login-container h2{margin-bottom:20px;color:#38bdf8;}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:white;
}

input:focus{outline:none;border-color:#38bdf8;}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#0ea5e9;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{background:#0284c7;}

.loading{
  opacity:0.6;
  pointer-events:none;
}

.erro{
  color:#ef4444;
  margin-top:10px;
  font-size:14px;
}

@media(max-width:768px){
  .menu{display:none;flex-direction:column;background:#020617;position:absolute;top:60px;right:20px;padding:10px;border-radius:8px;}
  .menu.show{display:flex;}
  .menu-toggle{display:block;}
}
</style>
</head>

<body>

<header>
<div class="container">
  <div class="logo">
    <img src="logo.png" alt="Logo Escola">
    EEEFM Estudo e Trabalho
  </div>
  <div class="menu-toggle" id="menuToggle">&#9776;</div>
  <nav class="menu" id="menuNav">
    <a href="index.html">Início</a>
    <a href="noticias.html">Notícias</a>
    <a href="login-professor.html">Portal do Professor</a>
    <a href="login-admin.html">Admin</a>
  </nav>
</div>
</header>

<div class="login-container">
  <h2>🎓 Portal do Aluno</h2>
  <input id="cpf" placeholder="CPF" maxlength="14" autocomplete="username">
  <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
  <button id="btnLogin">Entrar</button>
  <div id="erro" class="erro"></div>
</div>

<script src="js/script.js"></script>

<script>
// BUG FIX: API original mantida
const API="https://portal-escola-backend.onrender.com"

// MENU MOBILE
const menuToggle=document.getElementById("menuToggle")
const menuNav=document.getElementById("menuNav")
if(menuToggle) {
    menuToggle.addEventListener("click",()=>menuNav.classList.toggle("show"))
}

// FORMATAR CPF
const cpfInput = document.getElementById("cpf")
if(cpfInput) {
    cpfInput.addEventListener("input",(e)=>{
      let cpf = e.target.value.replace(/\D/g,'')
      cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
      cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
      cpf = cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")
      e.target.value=cpf
    })
}

// LOGIN
const btn=document.getElementById("btnLogin")
const erro=document.getElementById("erro")

// BUG FIX: Função nomeada para evitar erros de referência no console
async function loginAluno(){
  if(!erro) return;
  erro.innerText=""
  
  const inputCpf = document.getElementById("cpf")
  const inputSenha = document.getElementById("senha")
  
  let cpf=inputCpf.value.replace(/\D/g,'')
  let senha=inputSenha.value
  
  if(!cpf || !senha){
    erro.innerText="Preencha todos os campos";
    return;
  }

  btn.classList.add("loading")
  btn.innerText="Entrando..."

  try{
    let res=await fetch(API+"/login-aluno",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({cpf,senha})
    })

    // BUG FIX: Verificação de erro de resposta antes do JSON
    if(!res.ok) {
        erro.innerText = "CPF ou senha inválidos";
        finalizarBotao();
        return;
    }

    let data=await res.json()
    if(data.success){
      localStorage.setItem("token",data.token)
      localStorage.setItem("usuario",JSON.stringify(data.aluno))
      window.location.href="aluno.html"
    }else{
      erro.innerText="CPF ou senha inválidos"
    }
  }catch(err){
    console.error("Erro de Rede:", err)
    erro.innerText="Erro de conexão com servidor"
  }

  finalizarBotao()
}

function finalizarBotao() {
    btn.classList.remove("loading")
    btn.innerText="Entrar"
}

// EVENTOS
if(btn) {
    btn.onclick = loginAluno;
}

// BUG FIX: Evento Enter corrigido para chamar a função correta
document.addEventListener("keypress",(e)=>{
    if(e.key==="Enter") {
        loginAluno();
    }
})
</script>

</body>
</html>
