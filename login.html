<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Aluno - EEEFM Estudo e Trabalho</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f1f3f6;
}

.login-container{
max-width:400px;
margin:120px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
color:#0a2a66;
}

.login-container input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.login-container button{
width:100%;
margin-top:15px;
padding:12px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-container button:hover{
background:#1c4cb3;
}

.link{
margin-top:15px;
display:block;
cursor:pointer;
color:#0a2a66;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-container" id="loginBox">

<h2>Portal do Aluno</h2>

<input
id="cpf"
placeholder="Digite seu CPF"
maxlength="14"
oninput="formatarCPF(this)"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button onclick="loginAluno()">Entrar</button>

<span class="link" onclick="abrirRecuperar()">Esqueci minha senha</span>

</div>



<!-- RECUPERAR SENHA -->

<div class="login-container" id="recuperarBox" style="display:none;">

<h2>Recuperar Senha</h2>

<input
id="cpfRecuperar"
placeholder="Digite seu CPF"
maxlength="14"
oninput="formatarCPF(this)"
>

<button onclick="recuperarSenha()">Continuar</button>

<span class="link" onclick="voltarLogin()">Voltar</span>

</div>



<!-- REDEFINIR SENHA -->

<div class="login-container" id="novaSenhaBox" style="display:none;">

<h2>Nova Senha</h2>

<input
type="password"
id="novaSenha"
placeholder="Digite a nova senha"
>

<button onclick="redefinirSenha()">Salvar Nova Senha</button>

</div>



<script src="script.js"></script>

<script>

let cpfRecuperacao=""

/* =========================
ABRIR RECUPERAÇÃO
========================= */

function abrirRecuperar(){

document.getElementById("loginBox").style.display="none"
document.getElementById("recuperarBox").style.display="block"

}

/* =========================
VOLTAR LOGIN
========================= */

function voltarLogin(){

document.getElementById("recuperarBox").style.display="none"
document.getElementById("loginBox").style.display="block"

}

/* =========================
RECUPERAR SENHA
========================= */

async function recuperarSenha(){

let cpf=document.getElementById("cpfRecuperar").value.replace(/\D/g,'')

let res=await fetch(API+"/recuperar-senha",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
cpf:cpf,
tipo:"aluno"
})

})

let data=await res.json()

if(data.success){

cpfRecuperacao=cpf

document.getElementById("recuperarBox").style.display="none"
document.getElementById("novaSenhaBox").style.display="block"

}else{

alert("CPF não encontrado")

}

}

/* =========================
REDEFINIR SENHA
========================= */

async function redefinirSenha(){

let senha=document.getElementById("novaSenha").value

let res=await fetch(API+"/redefinir-senha",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
cpf:cpfRecuperacao,
novaSenha:senha,
tipo:"aluno"
})

})

let data=await res.json()

if(data.success){

alert("Senha alterada com sucesso!")

window.location="login.html"

}else{

alert("Erro ao redefinir senha")

}

}

</script>

</body>
</html>
