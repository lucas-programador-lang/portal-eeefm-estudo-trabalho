<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<style>

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
text-align:center;
min-width:180px;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
min-width:500px;
}

table th, table td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

.btn{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.btn-excluir{
background:#dc3545;
color:white;
}

form{
margin-top:15px;
margin-bottom:30px;
}

@media(max-width:768px){

.dashboard{
flex-direction:column;
}

}

</style>

</head>

<body>

<script>

/* =========================
PROTEGER ADMIN
========================= */

if(!localStorage.getItem("adminLogado")){
window.location="login-admin.html"
}

</script>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="admin.html">Painel</a>
<button onclick="logout()">Sair</button>
</div>

</nav>

</div>

</header>


<div class="container">

<h2 style="margin-top:30px;">Painel Administrativo</h2>


<!-- DASHBOARD -->

<div class="dashboard">

<div class="card">
<h3>Total de Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>Total de Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>Total de Notas</h3>
<p id="totalNotas">0</p>
</div>

</div>


<!-- CADASTRAR ALUNO -->

<h3>Cadastrar Aluno</h3>

<form onsubmit="cadastrarAluno(event)">

<input id="nomeAluno" placeholder="Nome do aluno" required>

<input id="cpfAluno" placeholder="CPF" oninput="formatarCPF(this)" required>

<input id="senhaAluno" placeholder="Senha" required>

<button type="submit">Cadastrar</button>

</form>



<!-- CADASTRAR PROFESSOR -->

<h3>Cadastrar Professor</h3>

<form onsubmit="cadastrarProfessor(event)">

<input id="nomeProfessor" placeholder="Nome do professor" required>

<input id="cpfProfessor" placeholder="CPF" oninput="formatarCPF(this)" required>

<input id="senhaProfessor" placeholder="Senha" required>

<input id="disciplinaProfessor" placeholder="Disciplina" required>

<button type="submit">Cadastrar</button>

</form>



<!-- LISTA DE ALUNOS -->

<h3>Lista de Alunos</h3>

<div class="table-container">

<table id="tabelaAlunos">

<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
<th>Ações</th>
</tr>

</table>

</div>



<!-- LISTA DE PROFESSORES -->

<h3>Lista de Professores</h3>

<div class="table-container">

<table id="tabelaProfessores">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Disciplina</th>
</tr>

</table>

</div>

</div>


<script>

/* =========================
PEGAR TOKEN
========================= */

function getToken(){
return localStorage.getItem("token")
}


/* =========================
DASHBOARD
========================= */

async function carregarDashboard(){

try{

let res = await fetch(API + "/dashboard",{

headers:{
Authorization:"Bearer "+getToken()
}

})

let dados = await res.json()

document.getElementById("totalAlunos").innerText = dados.alunos
document.getElementById("totalProfessores").innerText = dados.professores
document.getElementById("totalNotas").innerText = dados.notas

}catch(err){

console.log("Erro dashboard")

}

}


/* =========================
CARREGAR PROFESSORES
========================= */

async function carregarProfessores(){

try{

let res = await fetch(API + "/professores",{

headers:{
Authorization:"Bearer "+getToken()
}

})

let professores = await res.json()

let tabela = document.getElementById("tabelaProfessores")

tabela.innerHTML = `
<tr>
<th>ID</th>
<th>Nome</th>
<th>Disciplina</th>
</tr>
`

professores.forEach(p=>{

tabela.innerHTML += `
<tr>
<td>${p.id}</td>
<td>${p.nome}</td>
<td>${p.disciplina}</td>
</tr>
`

})

}catch(err){

console.log("Erro professores")

}

}


/* =========================
EXCLUIR ALUNO
========================= */

async function excluirAluno(id){

if(!confirm("Deseja excluir este aluno?")) return

try{

await fetch(API+"/aluno/"+id,{
method:"DELETE",
headers:{
Authorization:"Bearer "+getToken()
}
})

carregarAlunos()
carregarDashboard()

}catch(err){

alert("Erro ao excluir aluno")

}

}


/* =========================
INICIAR
========================= */

window.onload=function(){

carregarAlunos()
carregarProfessores()
carregarDashboard()

}

</script>

</body>

</html>
