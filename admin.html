<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f4fb;
display:flex;
}

.sidebar{
width:220px;
background:#0a2a66;
min-height:100vh;
color:white;
padding-top:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
padding:12px 20px;
background:none;
border:none;
color:white;
text-align:left;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#123c8a;
}

.main{
margin-left:220px;
padding:30px;
width:100%;
box-sizing:border-box;
}

.box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-top:20px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:15px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

button.action{
margin-top:15px;
padding:10px 15px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button.action:hover{
background:#123c8a;
}

#editor{
height:200px;
margin-top:10px;
background:white;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card p{
font-size:32px;
color:#0a2a66;
font-weight:bold;
margin:10px 0 0;
}

.section{
display:none;
}

.section.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

th, td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#0a2a66;
color:white;
}

.small-btn{
background:#dc2626;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.small-btn:hover{
background:#b91c1c;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('professores')">Professores</button>
<button onclick="mostrar('avisos')">Avisos</button>
<button onclick="mostrar('noticias')">Notícias</button>
<button onclick="mostrar('publicacoes')">Publicações</button>
<button onclick="logout()">Sair</button>

</div>


<div class="main">

<div id="dashboard" class="section active">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>Publicações</h3>
<p id="totalPublicacoes">0</p>
</div>

</div>

</div>



<div id="alunos" class="section">

<div class="box">

<h3>Cadastrar Aluno</h3>

<form id="formAluno">

<input id="nomeAluno" placeholder="Nome" required>
<input id="cpfAluno" placeholder="CPF" required maxlength="14">
<input id="senhaAluno" placeholder="Senha" required>

<button class="action" type="submit">
Cadastrar
</button>

</form>

</div>

</div>



<div id="professores" class="section">

<div class="box">

<h3>Cadastrar Professor</h3>

<form id="formProfessor">

<input id="nomeProfessor" placeholder="Nome" required>
<input id="cpfProfessor" placeholder="CPF" required maxlength="14">
<input id="senhaProfessor" placeholder="Senha" required>
<input id="disciplinaProfessor" placeholder="Disciplina" required>

<button class="action" type="submit">
Cadastrar
</button>

</form>

</div>

</div>



<div id="avisos" class="section">

<div class="box">

<h3>Publicar Aviso</h3>

<form id="formAviso">

<input id="tituloAviso" placeholder="Título" required>

<textarea id="textoAviso" placeholder="Mensagem" required></textarea>

<button class="action" type="submit">
Publicar
</button>

</form>

</div>

</div>



<div id="noticias" class="section">

<div class="box">

<h3>Publicar Notícia</h3>

<form id="formNoticia">

<input id="tituloNoticia" placeholder="Título" required>
<input id="subtituloNoticia" placeholder="Subtítulo">

<label>📷 Imagem</label>
<input type="file" id="imagemUpload" accept="image/*">

<label>Conteúdo</label>
<div id="editor"></div>

<button class="action" type="submit">
Publicar
</button>

</form>

</div>

</div>



<div id="publicacoes" class="section">

<div class="box">

<h3>Publicações</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Título</th>
<th>Tipo</th>
<th>Data</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="listaPublicacoes"></tbody>

</table>

</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
