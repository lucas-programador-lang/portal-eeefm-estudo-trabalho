<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo - EEEFM Estudo e Trabalho</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="admin.html">Painel</a>
<a href="login.html">Portal do Aluno</a>

<button onclick="logout()" style="margin-left:20px;">
Sair
</button>

</div>

</nav>

</div>

</header>


<div class="container">

<h2 style="margin-top:40px;">Painel Administrativo</h2>


<h3>Cadastrar Aluno</h3>

<form onsubmit="cadastrarAluno(event)">

<input type="text" id="nomeAluno" placeholder="Nome do aluno" required>

<input type="text" id="cpfAluno" placeholder="CPF" required>

<button type="submit">Cadastrar</button>

</form>



<h3 style="margin-top:40px;">Cadastrar Professor</h3>

<form onsubmit="cadastrarProfessor(event)">

<input type="text" id="nomeProfessor" placeholder="Nome do professor" required>

<input type="text" id="disciplinaProfessor" placeholder="Disciplina" required>

<button type="submit">Cadastrar</button>

</form>



<h3 style="margin-top:40px;">Registrar Nota</h3>

<form onsubmit="registrarNota(event)">

<input type="text" id="cpfNota" placeholder="CPF do aluno" required>

<input type="text" id="disciplinaNota" placeholder="Disciplina" required>

<input type="number" step="0.1" id="notaAluno" placeholder="Nota" required>

<button type="submit">Registrar Nota</button>

</form>



<h3 style="margin-top:40px;">Alunos Cadastrados</h3>

<table id="tabelaAlunos">

<tr>
<th>Nome</th>
<th>CPF</th>
</tr>

</table>

</div>


<script>

/* PROTEGER ACESSO DO ADMIN */

if(!localStorage.getItem("adminLogado")){

window.location="login.html"

}

</script>

<script src="logout.js"></script>

</body>

</html>
