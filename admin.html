<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<style>

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th, table td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

.btn{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.btn-editar{
background:#ffc107;
}

.btn-excluir{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="admin.html">Painel</a>
<button onclick="logout()">Sair</button>
</div>

</nav>

</div>

</header>


<div class="container">

<h2>Painel Administrativo</h2>


<!-- DASHBOARD -->

<div class="dashboard">

<div class="card">
<h3>Total de Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>Total de Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>Total de Notas</h3>
<p id="totalNotas">0</p>
</div>

</div>


<!-- CADASTRAR ALUNO -->

<h3>Cadastrar Aluno</h3>

<form onsubmit="cadastrarAluno(event)">

<input id="nomeAluno" placeholder="Nome">

<input id="cpfAluno" placeholder="CPF">

<button type="submit">Cadastrar</button>

</form>



<!-- CADASTRAR PROFESSOR -->

<h3>Cadastrar Professor</h3>

<form onsubmit="cadastrarProfessor(event)">

<input id="nomeProfessor" placeholder="Nome">

<input id="cpfProfessor" placeholder="CPF">

<input id="disciplinaProfessor" placeholder="Disciplina">

<button type="submit">Cadastrar</button>

</form>



<!-- LISTA DE ALUNOS -->

<h3>Lista de Alunos</h3>

<table id="tabelaAlunos">

<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
<th>Ações</th>
</tr>

</table>



<!-- LISTA DE PROFESSORES -->

<h3>Lista de Professores</h3>

<table id="tabelaProfessores">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Disciplina</th>
</tr>

</table>

</div>


<script>

async function carregarDashboard(){

let alunos=await fetch(API+"/alunos")
let listaAlunos=await alunos.json()

document.getElementById("totalAlunos").innerText=listaAlunos.length

}

async function carregarProfessores(){

let res=await fetch(API+"/professores")
let professores=await res.json()

let tabela=document.getElementById("tabelaProfessores")

professores.forEach(p=>{

tabela.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.nome}</td>
<td>${p.disciplina}</td>
</tr>
`

})

}

async function excluirAluno(id){

if(!confirm("Deseja excluir este aluno?")) return

await fetch(API+"/aluno/"+id,{
method:"DELETE"
})

carregarAlunos()

}

window.onload=function(){

carregarAlunos()
carregarProfessores()
carregarDashboard()

}

</script>

</body>

</html>
