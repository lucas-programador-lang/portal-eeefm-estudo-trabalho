<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f4fb;
display:flex;
}

/* MENU */

.sidebar{
width:220px;
background:#0a2a66;
height:100vh;
color:white;
padding-top:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
background:none;
border:none;
color:white;
text-align:left;
padding-left:25px;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#123c8a;
}

/* CONTEUDO */

.main{
margin-left:220px;
padding:30px;
width:100%;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card p{
font-size:32px;
color:#0a2a66;
font-weight:bold;
}

/* BOX */

.box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-top:20px;
}

/* INPUT */

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px 15px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#123c8a;
}

#editor{
height:200px;
margin-top:10px;
background:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('avisos')">Avisos</button>
<button onclick="mostrar('noticias')">Notícias</button>
<button onclick="mostrar('publicacoes')">Publicações</button>
<button onclick="logout()">Sair</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>Notas</h3>
<p id="totalNotas">0</p>
</div>

</div>

</div>

<!-- AVISOS -->

<div id="avisos" class="section" style="display:none">

<div class="box">

<h3>Publicar Aviso</h3>

<form onsubmit="publicarAviso(event)">

<input id="tituloAviso" placeholder="Título" required>
<textarea id="textoAviso" placeholder="Mensagem" required></textarea>

<button type="submit">Publicar</button>

</form>

</div>

</div>

<!-- NOTICIAS -->

<div id="noticias" class="section" style="display:none">

<div class="box">

<h3>Publicar Notícia</h3>

<form onsubmit="publicarNoticia(event)">

<input id="tituloNoticia" placeholder="Título" required>
<input id="subtituloNoticia" placeholder="Subtítulo">

<label>📷 Imagem</label>
<input type="file" id="imagemUpload" accept="image/*">

<div id="editor"></div>

<button type="submit">Publicar</button>

</form>

</div>

</div>

<!-- PUBLICACOES -->

<div id="publicacoes" class="section" style="display:none">

<div class="box">

<h3>Publicações</h3>

<table id="tabelaPublicacoes"></table>

</div>

</div>

</div>

<script>

const API="https://portal-escola-backend.onrender.com"

function mostrar(sec){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none"
})

document.getElementById(sec).style.display="block"

}

function logout(){

localStorage.clear()
window.location="login-admin.html"

}

var quill=new Quill('#editor',{theme:'snow'})

/* UPLOAD IMAGEM */

async function uploadImagem(file){

let formData=new FormData()

formData.append("imagem",file)

let res=await fetch(API+"/upload",{

method:"POST",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
},

body:formData

})

let data=await res.json()

if(data.success){
return data.url
}

return ""

}

/* PUBLICAR AVISO */

async function publicarAviso(e){

e.preventDefault()

let titulo=document.getElementById("tituloAviso").value
let conteudo=document.getElementById("textoAviso").value

let res=await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({
titulo,
conteudo,
imagem:"",
tipo:"aviso"
})

})

let data=await res.json()

if(data.success){

alert("Aviso publicado!")

e.target.reset()

}else{

alert("Erro ao publicar aviso")

}

}

/* PUBLICAR NOTICIA */

async function publicarNoticia(e){

e.preventDefault()

let titulo=document.getElementById("tituloNoticia").value
let subtitulo=document.getElementById("subtituloNoticia").value
let conteudo=quill.root.innerHTML

let imagem=""

let img=document.getElementById("imagemUpload")

if(img.files.length){

imagem=await uploadImagem(img.files[0])

}

let tituloFinal=subtitulo?titulo+" - "+subtitulo:titulo

let res=await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({

titulo:tituloFinal,
conteudo,
imagem,
tipo:"noticia"

})

})

let data=await res.json()

if(data.success){

alert("Notícia publicada!")

document.getElementById("tituloNoticia").value=""
document.getElementById("subtituloNoticia").value=""
document.getElementById("imagemUpload").value=""

quill.root.innerHTML=""

}else{

alert("Erro ao publicar notícia")

}

}

</script>

</body>
</html>
