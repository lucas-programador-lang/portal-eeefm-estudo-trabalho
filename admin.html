<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="style.css">

<!-- Editor profissional -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<script src="script.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
text-align:center;
min-width:180px;
}

.publicacao-box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:30px;
}

#editor{
height:200px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1c4cb3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th, table td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

.btn-excluir{
background:#dc3545;
}

</style>

</head>

<body>

<script>

/* =========================
PROTEGER ADMIN
========================= */

if(!localStorage.getItem("adminLogado")){
window.location="login-admin.html"
}

</script>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="admin.html">Painel</a>
<button onclick="logout()">Sair</button>
</div>

</nav>

</div>

</header>


<div class="container">

<h2 style="margin-top:30px;">Painel Administrativo</h2>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card">
<h3>Total de Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>Total de Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>Total de Notas</h3>
<p id="totalNotas">0</p>
</div>

</div>

<!-- PUBLICAR AVISO -->

<div class="publicacao-box">

<h3>Publicar Aviso</h3>

<form onsubmit="publicarAviso(event)">

<input id="tituloAviso" placeholder="Título do aviso" required>

<textarea id="textoAviso" placeholder="Texto do aviso" required></textarea>

<button type="submit">Publicar Aviso</button>

</form>

</div>


<!-- PUBLICAR NOTÍCIA -->

<div class="publicacao-box">

<h3>Publicar Notícia</h3>

<form onsubmit="publicarNoticia(event)">

<input id="tituloNoticia" placeholder="Título da notícia" required>

<input id="subtituloNoticia" placeholder="Subtítulo da notícia">

<label>Imagem da notícia</label>
<input type="file" id="imagemUpload" accept="image/*">

<label>Conteúdo da notícia</label>

<div id="editor"></div>

<button type="submit">Publicar Notícia</button>

</form>

</div>


<!-- LISTA DE PUBLICAÇÕES -->

<h3>Publicações</h3>

<table id="tabelaPublicacoes">

<tr>
<th>ID</th>
<th>Título</th>
<th>Tipo</th>
<th>Data</th>
<th>Ações</th>
</tr>

</table>

</div>


<script>

const API = "https://portal-escola-backend.onrender.com"

/* =========================
EDITOR DE TEXTO
========================= */

var quill = new Quill('#editor', {
theme: 'snow',
placeholder: 'Escreva o conteúdo da notícia...',
modules: {
toolbar: [
['bold','italic','underline'],
[{ 'list': 'ordered'}, { 'list': 'bullet' }],
['blockquote'],
['link'],
['clean']
]
}
})


/* =========================
CONVERTER IMAGEM BASE64
========================= */

function imagemBase64(file){

return new Promise((resolve,reject)=>{

const reader = new FileReader()

reader.onload = ()=>resolve(reader.result)

reader.onerror = error=>reject(error)

reader.readAsDataURL(file)

})

}


/* =========================
PUBLICAR NOTÍCIA
========================= */

async function publicarNoticia(e){

e.preventDefault()

let titulo = document.getElementById("tituloNoticia").value
let subtitulo = document.getElementById("subtituloNoticia").value
let conteudo = quill.root.innerHTML

let imagemInput = document.getElementById("imagemUpload")
let imagem = ""

if(imagemInput.files.length > 0){

imagem = await imagemBase64(imagemInput.files[0])

}

try{

let res = await fetch(API + "/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({
titulo: titulo + " - " + subtitulo,
conteudo,
imagem,
tipo:"noticia"
})

})

let data = await res.json()

if(data.success){

alert("Notícia publicada!")

document.getElementById("tituloNoticia").value=""
document.getElementById("subtituloNoticia").value=""
imagemInput.value=""

quill.root.innerHTML=""

carregarPublicacoes()

}

}catch(err){

alert("Erro ao publicar notícia")

}

}


/* =========================
CARREGAR PUBLICAÇÕES
========================= */

async function carregarPublicacoes(){

let res = await fetch(API + "/publicacoes")

let publicacoes = await res.json()

let tabela = document.getElementById("tabelaPublicacoes")

tabela.innerHTML = `
<tr>
<th>ID</th>
<th>Título</th>
<th>Tipo</th>
<th>Data</th>
<th>Ações</th>
</tr>
`

publicacoes.forEach(p=>{

tabela.innerHTML += `
<tr>
<td>${p.id}</td>
<td>${p.titulo}</td>
<td>${p.tipo}</td>
<td>${p.data_publicacao}</td>
<td>
<button class="btn-excluir" onclick="excluirPublicacao(${p.id})">Excluir</button>
</td>
</tr>
`

})

}

carregarPublicacoes()

</script>

</body>
</html>
