<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>

body{
background:#f4f6fb;
font-family:Arial;
margin:0;
}

header{
background:#0a2a66;
color:white;
padding:15px 0;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

.menu a,.menu button{
color:white;
margin-left:15px;
text-decoration:none;
background:none;
border:none;
cursor:pointer;
font-size:15px;
}

.admin-menu{
display:flex;
justify-content:center;
gap:15px;
margin:30px 0;
flex-wrap:wrap;
}

.admin-menu button{
background:white;
border:2px solid #0a2a66;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.admin-menu button:hover{
background:#0a2a66;
color:white;
transform:scale(1.05);
}

.admin-section{
display:none;
}

.admin-section.active{
display:block;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
}

.card p{
font-size:36px;
font-weight:bold;
color:#0a2a66;
}

.publicacao-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

button{
margin-top:15px;
padding:10px 15px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1c4cb3;
}

#editor{
height:250px;
margin-top:10px;
margin-bottom:20px;
background:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

table th{
background:#0a2a66;
color:white;
padding:12px;
}

table td{
padding:12px;
border-bottom:1px solid #eee;
}

.btn-excluir{
background:#dc3545;
padding:6px 12px;
border-radius:5px;
}

</style>

</head>

<body>

<script>

if(!localStorage.getItem("adminLogado")){
window.location="login-admin.html"
}

</script>

<header>

<div class="container">

<nav style="display:flex;justify-content:space-between;align-items:center;">

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<button onclick="logout()">Sair</button>
</div>

</nav>

</div>

</header>

<div class="container">

<h2 style="margin-top:30px;">Painel Administrativo</h2>

<div class="admin-menu">

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('professores')">Professores</button>
<button onclick="mostrar('avisos')">Avisos</button>
<button onclick="mostrar('noticias')">Notícias</button>
<button onclick="mostrar('publicacoes')">Publicações</button>

</div>


<div id="dashboard" class="admin-section active">

<div class="dashboard">

<div class="card">
<h3>👨‍🎓 Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>👨‍🏫 Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>📝 Notas</h3>
<p id="totalNotas">0</p>
</div>

</div>

</div>


<div id="avisos" class="admin-section">

<div class="publicacao-box">

<h3>Publicar Aviso</h3>

<form onsubmit="publicarAviso(event)">

<input id="tituloAviso" placeholder="Título do aviso" required>

<textarea id="textoAviso" placeholder="Texto do aviso" required></textarea>

<button type="submit">Publicar Aviso</button>

</form>

</div>

</div>


<div id="noticias" class="admin-section">

<div class="publicacao-box">

<h3>Publicar Notícia</h3>

<form onsubmit="publicarNoticia(event)">

<input id="tituloNoticia" placeholder="Título da notícia" required>

<input id="subtituloNoticia" placeholder="Subtítulo">

<label>Imagem</label>

<input type="file" id="imagemUpload" accept="image/*">

<label>Conteúdo</label>

<div id="editor"></div>

<button type="submit">Publicar Notícia</button>

</form>

</div>

</div>


<div id="publicacoes" class="admin-section">

<div class="publicacao-box">

<h3>Publicações</h3>

<table id="tabelaPublicacoes">

<tr>
<th>ID</th>
<th>Título</th>
<th>Tipo</th>
<th>Data</th>
<th>Ações</th>
</tr>

</table>

</div>

</div>

</div>


<script>

const API="https://portal-escola-backend.onrender.com"

function logout(){
localStorage.clear()
window.location="login-admin.html"
}

function mostrar(sec){

document.querySelectorAll(".admin-section").forEach(s=>{

s.classList.remove("active")

})

document.getElementById(sec).classList.add("active")

}

var quill=new Quill('#editor',{theme:'snow'})

async function publicarAviso(e){

e.preventDefault()

try{

let titulo=document.getElementById("tituloAviso").value
let conteudo=document.getElementById("textoAviso").value

let res=await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({
titulo,
conteudo,
imagem:"",
tipo:"aviso"
})

})

let data=await res.json()

if(data.success){

alert("Aviso publicado com sucesso!")

e.target.reset()

carregarPublicacoes()

mostrar("publicacoes")

}else{

alert("Erro ao publicar aviso")

}

}catch(err){

alert("Erro de conexão com servidor")

}

}


async function publicarNoticia(e){

e.preventDefault()

try{

let titulo=document.getElementById("tituloNoticia").value
let subtitulo=document.getElementById("subtituloNoticia").value
let conteudo=quill.root.innerHTML

let imagem=""

let img=document.getElementById("imagemUpload")

if(img.files.length){

imagem=await uploadImagem(img.files[0])

}

let tituloFinal=subtitulo?titulo+" - "+subtitulo:titulo

let res=await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({

titulo:tituloFinal,
conteudo,
imagem,
tipo:"noticia"

})

})

let data=await res.json()

if(data.success){

alert("Notícia publicada!")

carregarPublicacoes()

mostrar("publicacoes")

}else{

alert("Erro ao publicar notícia")

}

}catch(err){

alert("Erro no servidor")

}

}


async function uploadImagem(file){

let formData=new FormData()

formData.append("imagem",file)

let res=await fetch(API+"/upload",{

method:"POST",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
},

body:formData

})

let data=await res.json()

return data.url

}


async function carregarPublicacoes(){

let res=await fetch(API+"/publicacoes")

let dados=await res.json()

let tabela=document.getElementById("tabelaPublicacoes")

tabela.innerHTML=""

dados.forEach(p=>{

tabela.innerHTML+=`

<tr>

<td>${p.id}</td>
<td>${p.titulo}</td>
<td>${p.tipo}</td>
<td>${new Date(p.data_publicacao).toLocaleDateString()}</td>

<td>

<button class="btn-excluir" onclick="excluirPublicacao(${p.id})">Excluir</button>

</td>

</tr>

`

})

}

async function excluirPublicacao(id){

if(!confirm("Excluir publicação?"))return

await fetch(API+"/publicacao/"+id,{

method:"DELETE",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
}

})

carregarPublicacoes()

}

carregarPublicacoes()

</script>

</body>
</html>
