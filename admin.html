<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f4fb;
display:flex;
}

.sidebar{
width:220px;
background:#0a2a66;
height:100vh;
color:white;
padding-top:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
background:none;
border:none;
color:white;
text-align:left;
padding-left:25px;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#123c8a;
}

.main{
margin-left:220px;
padding:30px;
width:100%;
}

.box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-top:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px 15px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#123c8a;
}

#editor{
height:200px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('professores')">Professores</button>
<button onclick="mostrar('avisos')">Avisos</button>
<button onclick="mostrar('noticias')">Notícias</button>

</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Dashboard</h2>
</div>

<!-- ALUNOS -->
<div id="alunos" class="section" style="display:none">

<div class="box">

<h3>Cadastrar Aluno</h3>

<input id="nomeAluno" placeholder="Nome">
<input id="cpfAluno" placeholder="CPF">
<input id="senhaAluno" placeholder="Senha">

<button onclick="cadastrarAluno()">Cadastrar</button>

</div>
</div>

<!-- PROFESSORES -->
<div id="professores" class="section" style="display:none">

<div class="box">

<h3>Cadastrar Professor</h3>

<input id="nomeProfessor" placeholder="Nome">
<input id="cpfProfessor" placeholder="CPF">
<input id="senhaProfessor" placeholder="Senha">
<input id="disciplinaProfessor" placeholder="Disciplina">

<button onclick="cadastrarProfessor()">Cadastrar</button>

</div>

</div>

<!-- AVISOS -->
<div id="avisos" class="section" style="display:none">

<div class="box">

<h3>Publicar Aviso</h3>

<input id="tituloAviso" placeholder="Título">
<textarea id="textoAviso" placeholder="Mensagem"></textarea>

<button onclick="publicarAviso()">Publicar</button>

</div>

</div>

<!-- NOTICIAS -->
<div id="noticias" class="section" style="display:none">

<div class="box">

<h3>Publicar Notícia</h3>

<input id="tituloNoticia" placeholder="Título">
<input id="subtituloNoticia" placeholder="Subtítulo">

<input type="file" id="imagemUpload">

<div id="editor"></div>

<button onclick="publicarNoticia()">Publicar</button>

</div>

</div>

</div>

<script>

const API="https://portal-escola-backend.onrender.com"

function mostrar(sec){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none"
})

document.getElementById(sec).style.display="block"

}

var quill=new Quill('#editor',{theme:'snow'})

async function cadastrarAluno(){

let nome=document.getElementById("nomeAluno").value
let cpf=document.getElementById("cpfAluno").value
let senha=document.getElementById("senhaAluno").value

let res=await fetch(API+"/aluno",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({nome,cpf,senha})

})

let data=await res.json()

alert(data.success?"Aluno cadastrado":"Erro")

}

async function cadastrarProfessor(){

let nome=document.getElementById("nomeProfessor").value
let cpf=document.getElementById("cpfProfessor").value
let senha=document.getElementById("senhaProfessor").value
let disciplina=document.getElementById("disciplinaProfessor").value

let res=await fetch(API+"/professor",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({nome,cpf,senha,disciplina})

})

let data=await res.json()

alert(data.success?"Professor cadastrado":"Erro")

}

async function uploadImagem(file){

let formData=new FormData()

formData.append("imagem",file)

let res=await fetch(API+"/upload",{

method:"POST",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
},

body:formData

})

let data=await res.json()

return data.url

}

async function publicarAviso(){

let titulo=document.getElementById("tituloAviso").value
let conteudo=document.getElementById("textoAviso").value

let res=await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({titulo,conteudo,imagem:"",tipo:"aviso"})

})

let data=await res.json()

alert(data.success?"Aviso publicado":"Erro")

}

async function publicarNoticia(){

let titulo=document.getElementById("tituloNoticia").value
let subtitulo=document.getElementById("subtituloNoticia").value
let conteudo=quill.root.innerHTML

let imagem=""

let img=document.getElementById("imagemUpload")

if(img.files.length){
imagem=await uploadImagem(img.files[0])
}

let tituloFinal=subtitulo?titulo+" - "+subtitulo:titulo

let res=await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({
titulo:tituloFinal,
conteudo,
imagem,
tipo:"noticia"
})

})

let data=await res.json()

alert(data.success?"Notícia publicada":"Erro")

}

</script>

</body>
</html>
