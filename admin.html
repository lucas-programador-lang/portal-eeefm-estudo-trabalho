<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
text-align:center;
}

.publicacao-box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:30px;
}

#editor{
height:250px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1c4cb3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th, table td{
border:1px solid #ddd;
padding:8px;
}

.btn-excluir{
background:#dc3545;
}

</style>

</head>

<body>

<script>

if(!localStorage.getItem("adminLogado")){
window.location="login-admin.html"
}

</script>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<button onclick="logout()">Sair</button>
</div>

</nav>

</div>

</header>

<div class="container">

<h2>Painel Administrativo</h2>

<div class="dashboard">

<div class="card">
<h3>Total de Alunos</h3>
<p id="totalAlunos">0</p>
</div>

<div class="card">
<h3>Total de Professores</h3>
<p id="totalProfessores">0</p>
</div>

<div class="card">
<h3>Total de Notas</h3>
<p id="totalNotas">0</p>
</div>

</div>


<div class="publicacao-box">

<h3>Publicar Aviso</h3>

<form onsubmit="publicarAviso(event)">

<input id="tituloAviso" placeholder="Título do aviso" required>

<textarea id="textoAviso" placeholder="Texto do aviso" required></textarea>

<button type="submit">Publicar Aviso</button>

</form>

</div>


<div class="publicacao-box">

<h3>Publicar Notícia</h3>

<form onsubmit="publicarNoticia(event)">

<input id="tituloNoticia" placeholder="Título da notícia" required>

<input id="subtituloNoticia" placeholder="Subtítulo">

<label>Imagem da notícia</label>
<input type="file" id="imagemUpload" accept="image/*">

<label>Conteúdo</label>
<div id="editor"></div>

<label>
<input type="checkbox" id="destaque">
 Notícia destaque
</label>

<button type="submit">Publicar Notícia</button>

</form>

</div>


<h3>Publicações</h3>

<table id="tabelaPublicacoes">

<tr>
<th>ID</th>
<th>Título</th>
<th>Tipo</th>
<th>Data</th>
<th>Ações</th>
</tr>

</table>

</div>


<script>

const API = "https://portal-escola-backend.onrender.com"

var quill = new Quill('#editor', {

theme:'snow',

modules:{
toolbar:[
['bold','italic','underline','strike'],
[{ 'header':1},{ 'header':2}],
[{ 'list':'ordered'},{ 'list':'bullet'}],
['blockquote','code-block'],
['link','image'],
['clean']
]
}

})


async function uploadImagem(file){

let formData = new FormData()

formData.append("imagem",file)

let res = await fetch(API+"/upload",{

method:"POST",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
},

body:formData

})

let data = await res.json()

return data.url

}


async function publicarNoticia(e){

e.preventDefault()

let titulo = document.getElementById("tituloNoticia").value
let subtitulo = document.getElementById("subtituloNoticia").value
let conteudo = quill.root.innerHTML
let destaque = document.getElementById("destaque").checked

let imagem = ""

let imgInput = document.getElementById("imagemUpload")

if(imgInput.files.length){

imagem = await uploadImagem(imgInput.files[0])

}

let res = await fetch(API+"/publicacao",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},

body:JSON.stringify({

titulo: titulo+" - "+subtitulo,

conteudo,

imagem,

tipo:"noticia",

destaque

})

})

let data = await res.json()

if(data.success){

alert("Notícia publicada")

location.reload()

}

}


async function carregarPublicacoes(){

let res = await fetch(API+"/publicacoes")

let dados = await res.json()

let tabela = document.getElementById("tabelaPublicacoes")

tabela.innerHTML=`
<tr>
<th>ID</th>
<th>Título</th>
<th>Tipo</th>
<th>Data</th>
<th>Ações</th>
</tr>
`

dados.forEach(p=>{

tabela.innerHTML+=`

<tr>

<td>${p.id}</td>

<td>${p.titulo}</td>

<td>${p.tipo}</td>

<td>${new Date(p.data_publicacao).toLocaleDateString()}</td>

<td>
<button class="btn-excluir" onclick="excluirPublicacao(${p.id})">Excluir</button>
</td>

</tr>
`

})

}

carregarPublicacoes()

</script>

</body>
</html>
