<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Aluno</title>

<link rel="stylesheet" href="css/style.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;}

/* HEADER */
.header-comum{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#020617;
  border-bottom:1px solid #1e293b;
  z-index:999;
}

/* CENTRALIZAR HEADER */
.header-comum .container{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{width:50px;}
.logo strong{color:#38bdf8;font-size:18px;}

/* BOLETIM */
.main-container{
  max-width:800px;
  margin:120px auto 40px auto;
  padding:20px;
  background:#020617;
  border-radius:12px;
  border:1px solid #1e293b;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#0ea5e9;color:white;padding:10px;}
td{padding:10px;border:1px solid #1e293b;}

.aprovado{color:#22c55e;font-weight:bold;}
.reprovado{color:#ef4444;font-weight:bold;}

.btn{
  margin-top:20px;
  padding:12px;
  background:#0ea5e9;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
}
.btn:hover{background:#0284c7;}

/* BOTÕES */
.botoes{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* TROCAR SENHA */
.trocar-senha-box{
  max-width:400px;
  margin:20px auto;
  background:#020617;
  padding:20px;
  border-radius:10px;
  border:1px solid #1e293b;
  display:none;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:white;
}
</style>
</head>

<body>

<header class="header-comum">
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Logo Escola">
      <strong>EEEFM Estudo e Trabalho</strong>
    </div>
  </div>
</header>

<div class="main-container">

<h2>📘 Boletim Escolar</h2>

<table id="tabela"></table>

<div class="botoes">
  <button class="btn" onclick="exportarPDF()">📄 Baixar PDF</button>
  <button class="btn" onclick="abrirTrocarSenha()">🔒 Trocar senha</button>
  <button class="btn" onclick="logout()">🚪 Sair</button>
</div>

</div>

<div class="trocar-senha-box" id="trocarSenhaBox">
<h3>Alterar Senha</h3>
<input type="password" id="senhaAtual" placeholder="Senha atual">
<input type="password" id="novaSenha" placeholder="Nova senha">
<button class="btn" onclick="trocarSenha()">Salvar</button>
</div>

<script src="js/logout.js"></script>
<script src="js/script.js"></script>

<script>
// Ajuste a API para o seu novo worker se necessário, mantive a original por enquanto
const API="https://portal-escola-backend.onrender.com"

function getToken(){return localStorage.getItem("token")}

// CORREÇÃO: Função de logout verificando se já existe no arquivo externo
function logout(){
    localStorage.clear(); 
    window.location.href="login.html";
}

// Verificação imediata de segurança
if(!getToken()){logout()}

/* CARREGAR BOLETIM */
async function carregarBoletim(){
    let tabela=document.getElementById("tabela")
    let usuarioStr = localStorage.getItem("usuario")
    
    // BUG FIX: Evita erro de JSON.parse(null) se o localStorage estiver vazio
    if(!usuarioStr || usuarioStr === "undefined") { logout(); return; }
    
    let usuario;
    try {
        usuario = JSON.parse(usuarioStr);
    } catch(e) {
        logout(); return;
    }

    try{
        let res=await fetch(API+"/boletim/"+usuario.id,{
            headers:{Authorization:"Bearer "+getToken()}
        })
        
        if(res.status===401){logout();return}
        
        let notas=await res.json()
        let soma=0

        tabela.innerHTML=`<tr><th>Disciplina</th><th>Nota</th></tr>`

        // BUG FIX: Verifica se 'notas' é realmente um array para não quebrar o forEach
        if(Array.isArray(notas)) {
            notas.forEach(n=>{
                tabela.innerHTML+=`<tr><td>${n.disciplina}</td><td>${n.nota}</td></tr>`
                soma+=Number(n.nota)
            })

            let media=notas.length?(soma/notas.length).toFixed(1):0
            let aprovado=media>=6

            tabela.innerHTML+=`
            <tr><td><strong>Média</strong></td><td>${media}</td></tr>
            <tr><td><strong>Situação</strong></td><td class="${aprovado?"aprovado":"reprovado"}">${aprovado?"Aprovado":"Reprovado"}</td></tr>
            `
        } else {
            tabela.innerHTML = "<tr><td colspan='2'>Nenhuma nota encontrada.</td></tr>";
        }

    }catch(err){
        console.error("Erro de Console:", err)
        alert("Erro ao carregar boletim")
    }
}

/* TROCAR SENHA */
function abrirTrocarSenha(){
    let box=document.getElementById("trocarSenhaBox")
    box.style.display = (box.style.display==="block" || box.style.display==="") ? "none" : "block"
}

async function trocarSenha(){
    let senhaAtualInput=document.getElementById("senhaAtual")
    let novaSenhaInput=document.getElementById("novaSenha")
    
    let usuarioStr = localStorage.getItem("usuario");
    if(!usuarioStr) return;
    let usuario = JSON.parse(usuarioStr);

    try {
        let res=await fetch(API+"/trocar-senha",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+getToken()
            },
            body:JSON.stringify({
                cpf:usuario.cpf,
                senhaAtual:senhaAtualInput.value,
                novaSenha:novaSenhaInput.value,
                tipo:"aluno"
            })
        })

        let data=await res.json()

        if(data.success){
            alert("Senha alterada")
            senhaAtualInput.value=""
            novaSenhaInput.value=""
            document.getElementById("trocarSenhaBox").style.display="none"
        }else{
            alert(data.message || "Senha incorreta")
        }
    } catch(err) {
        alert("Erro ao conectar com o servidor")
    }
}

/* EXPORTAR PDF */
function exportarPDF(){window.print()}

// Garante que o evento carregue após o DOM
window.addEventListener('load', carregarBoletim);
</script>

</body>
</html>
