<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Professor</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#020617);
  min-height:100vh;
}

/* =========================
NAVBAR
========================= */
header{
  background:#020617;
  padding:15px 0;
  border-bottom:1px solid #1e293b;
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
}

header .container{
  max-width:1200px;
  margin:auto;
  padding:0 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header .logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#38bdf8;
  font-weight:bold;
  font-size:18px;
}

header .logo img{
  width:45px;
}

header .menu a{
  color:#cbd5f5;
  margin-left:20px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
  position:relative;
}

header .menu a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0%;
  height:2px;
  background:#38bdf8;
  transition:0.3s;
}

header .menu a:hover::after{
  width:100%;
}

header .menu a:hover{
  color:#38bdf8;
}

/* =========================
LOGIN BOX
========================= */
.login-box{
  width:100%;
  max-width:400px;
  background:#020617;
  padding:30px;
  border-radius:12px;
  border:1px solid #1e293b;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  text-align:center;
  margin:150px auto 0 auto; /* evita sobreposição do header */
}

.login-box h2{
  margin-bottom:20px;
  color:#38bdf8;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:white;
}

input:focus{
  outline:none;
  border-color:#38bdf8;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#0ea5e9;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#0284c7;
}

.link{
  margin-top:12px;
  display:block;
  cursor:pointer;
  color:#38bdf8;
}

.erro{
  color:#ef4444;
  margin-top:10px;
  font-size:14px;
}

.loading{
  opacity:0.6;
  pointer-events:none;
}

.trocar-senha-box{
  max-width:400px;
  margin:20px auto;
  background:#020617;
  padding:20px;
  border-radius:10px;
  border:1px solid #1e293b;
  display:none;
}
</style>
</head>

<body>

<!-- NAVBAR FIXA -->
<header>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Logo Escola">
      EEEFM Estudo e Trabalho
    </div>
    <div class="menu">
      <a href="index.html">Início</a>
      <a href="noticias.html">Notícias</a>
      <a href="login.html">Portal do Aluno</a>
      <a href="admin.html">Admin</a>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>👨‍🏫 Portal do Professor</h2>
  <input id="cpf" placeholder="CPF" maxlength="14">
  <input type="password" id="senha" placeholder="Senha">
  <button id="btnLogin">Entrar</button>
  <div id="erro" class="erro"></div>
  <span class="link" onclick="abrirRecuperar()">Esqueci minha senha</span>
</div>

<!-- RECUPERAR SENHA -->
<div class="login-box" id="recuperarBox" style="display:none;">
  <h2>Recuperar Senha</h2>
  <input id="cpfRecuperar" placeholder="CPF">
  <button onclick="recuperarSenha()">Continuar</button>
  <span class="link" onclick="voltarLogin()">Voltar</span>
</div>

<!-- NOVA SENHA -->
<div class="login-box" id="novaSenhaBox" style="display:none;">
  <h2>Nova Senha</h2>
  <input type="password" id="novaSenha" placeholder="Nova senha">
  <button onclick="redefinirSenha()">Salvar</button>
</div>

<script>
const API="https://portal-escola-backend.onrender.com"
let cpfRecuperacao=""

const btn = document.getElementById("btnLogin")
const erro = document.getElementById("erro")

// FORMATAR CPF
document.getElementById("cpf").addEventListener("input",(e)=>{
  let cpf = e.target.value.replace(/\D/g,'')
  cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
  cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
  cpf = cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")
  e.target.value = cpf
})

btn.onclick = loginProfessor

async function loginProfessor(){
  erro.innerText=""
  let cpf=document.getElementById("cpf").value.replace(/\D/g,'')
  let senha=document.getElementById("senha").value

  if(!cpf || !senha){
    erro.innerText="Preencha os campos"
    return
  }

  btn.classList.add("loading")
  btn.innerText="Entrando..."

  try{
    let res=await fetch(API+"/login-professor",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({cpf,senha})
    })

    let data=await res.json()

    if(data.success){
      localStorage.setItem("token",data.token)
      localStorage.setItem("usuario",JSON.stringify(data.professor))
      window.location="professor.html"
    }else{
      erro.innerText="CPF ou senha inválidos"
    }
  }catch{
    erro.innerText="Erro de conexão"
  }

  btn.classList.remove("loading")
  btn.innerText="Entrar"
}

// RECUPERAÇÃO
function abrirRecuperar(){
  loginBox.style.display="none"
  recuperarBox.style.display="block"
}

function voltarLogin(){
  recuperarBox.style.display="none"
  loginBox.style.display="block"
}

async function recuperarSenha(){
  let cpf=document.getElementById("cpfRecuperar").value.replace(/\D/g,'')
  if(!cpf){ alert("Digite CPF"); return }
  cpfRecuperacao = cpf
  recuperarBox.style.display="none"
  novaSenhaBox.style.display="block"
}

async function redefinirSenha(){
  let senha=document.getElementById("novaSenha").value
  let res=await fetch(API+"/trocar-senha",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      cpf:cpfRecuperacao,
      senhaAtual:"1234",
      novaSenha:senha,
      tipo:"professor"
    })
  })
  let data=await res.json()
  if(data.success){
    alert("Senha alterada")
    window.location="login-professor.html"
  }else{
    alert("Erro")
  }
}
</script>

</body>
</html>
