<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Professor - Portal Educacional</title>

<link rel="stylesheet" href="style.css">

<style>

.login-box{
max-width:420px;
margin:120px auto;
background:white;
padding:35px;
border-radius:8px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#0a2a66;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.login-box button{
width:100%;
margin-top:15px;
padding:12px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#1c4cb3;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="login.html">Portal do Aluno</a>
<a href="login-professor.html">Portal do Professor</a>
<a href="matricula.html">Matrícula</a>
</div>

</nav>

</div>

</header>


<div class="login-box">

<h2>Portal do Professor</h2>

<input
id="cpf"
placeholder="Digite seu CPF"
maxlength="14"
oninput="formatarCPF(this)"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button onclick="loginProfessor()">Entrar</button>

</div>


<script>

const API = "https://portal-escola-backend.onrender.com"

function formatarCPF(campo){

let cpf=campo.value.replace(/\D/g,'')

cpf=cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf=cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf=cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")

campo.value=cpf

}


async function loginProfessor(){

let cpf=document.getElementById("cpf").value.replace(/\D/g,'')
let senha=document.getElementById("senha").value

if(!cpf || !senha){

alert("Preencha CPF e senha")
return

}

let res=await fetch(API + "/login-professor",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({cpf,senha})

})

let data=await res.json()

if(data.success){

localStorage.setItem("professorLogado",JSON.stringify(data.professor))

window.location="professores.html"

}else{

alert("CPF ou senha inválidos")

}

}

</script>

</body>
</html>
