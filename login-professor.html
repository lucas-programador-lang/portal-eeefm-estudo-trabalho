<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal do Professor</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

/* BOX */
.login-box{
width:100%;
max-width:400px;
background:#020617;
padding:30px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:white;
}

/* BOTÃO */
button{
width:100%;
margin-top:15px;
padding:12px;
background:#0ea5e9;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:bold;
}

button:hover{
background:#0284c7;
}

/* LINK */
.link{
margin-top:12px;
display:block;
cursor:pointer;
color:#38bdf8;
}

/* ERRO */
.erro{
color:#ef4444;
margin-top:10px;
font-size:14px;
}

.loading{
opacity:0.6;
pointer-events:none;
}

</style>

</head>

<body>

<div class="login-box" id="loginBox">

<h2>👨‍🏫 Portal do Professor</h2>

<input id="cpf" placeholder="CPF" maxlength="14">
<input type="password" id="senha" placeholder="Senha">

<button id="btnLogin">Entrar</button>

<div id="erro" class="erro"></div>

<span class="link" onclick="abrirRecuperar()">Esqueci minha senha</span>

</div>

<div class="login-box" id="recuperarBox" style="display:none;">

<h2>Recuperar Senha</h2>

<input id="cpfRecuperar" placeholder="CPF">

<button onclick="recuperarSenha()">Continuar</button>

<span class="link" onclick="voltarLogin()">Voltar</span>

</div>

<div class="login-box" id="novaSenhaBox" style="display:none;">

<h2>Nova Senha</h2>

<input type="password" id="novaSenha" placeholder="Nova senha">

<button onclick="redefinirSenha()">Salvar</button>

</div>

<script>

const API="https://portal-escola-backend.onrender.com"

let cpfRecuperacao=""

const btn = document.getElementById("btnLogin")
const erro = document.getElementById("erro")

/* FORMATAR CPF */
document.getElementById("cpf").addEventListener("input",(e)=>{
let cpf = e.target.value.replace(/\D/g,'')

cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d)/,"$1.$2")
cpf = cpf.replace(/(\d{3})(\d{1,2})$/,"$1-$2")

e.target.value = cpf
})

btn.onclick = loginProfessor

/* LOGIN */
async function loginProfessor(){

erro.innerText=""

let cpf=document.getElementById("cpf").value.replace(/\D/g,'')
let senha=document.getElementById("senha").value

if(!cpf || !senha){
erro.innerText="Preencha os campos"
return
}

btn.classList.add("loading")
btn.innerText="Entrando..."

try{

let res=await fetch(API+"/login-professor",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({cpf,senha})
})

let data=await res.json()

if(data.success){

localStorage.setItem("token",data.token)
localStorage.setItem("usuario",JSON.stringify(data.professor))

window.location="professor.html"

}else{
erro.innerText="CPF ou senha inválidos"
}

}catch{
erro.innerText="Erro de conexão"
}

btn.classList.remove("loading")
btn.innerText="Entrar"

}

/* RECUPERAÇÃO */
function abrirRecuperar(){
loginBox.style.display="none"
recuperarBox.style.display="block"
}

function voltarLogin(){
recuperarBox.style.display="none"
loginBox.style.display="block"
}

async function recuperarSenha(){

let cpf=document.getElementById("cpfRecuperar").value.replace(/\D/g,'')

if(!cpf){
alert("Digite CPF")
return
}

cpfRecuperacao = cpf

recuperarBox.style.display="none"
novaSenhaBox.style.display="block"

}

/* REDEFINIR */
async function redefinirSenha(){

let senha=document.getElementById("novaSenha").value

let res=await fetch(API+"/trocar-senha",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
cpf:cpfRecuperacao,
senhaAtual:"1234",
novaSenha:senha,
tipo:"professor"
})
})

let data=await res.json()

if(data.success){
alert("Senha alterada")
window.location="login-professor.html"
}else{
alert("Erro")
}

}

</script>

</body>
</html>
