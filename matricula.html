<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pré-Matrícula - EEEFM Estudo e Trabalho</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* Mantido 100% da sua estrutura original de CSS */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;}

header{
  background:#020617;
  padding:15px;
  border-bottom:1px solid #1e293b;
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

.container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:40px;}
.logo strong{color:#38bdf8;font-size:18px;}

.menu a{color:white;text-decoration:none;margin-left:20px;font-size:14px;}
.menu a:hover{color:#38bdf8;}

/* FORMULÁRIO */
.form-box{
  max-width:500px;
  margin:120px auto 40px;
  background:#020617;
  padding:30px;
  border-radius:12px;
  border:1px solid #1e293b;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.form-box h2{
  color:#38bdf8;
  margin-bottom:20px;
  text-align:center;
}

.form-box label{
  display:block;
  margin-top:12px;
  font-size:14px;
}

.form-box input,
.form-box select{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#0f172a;
  color:white;
}

.form-box button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0ea5e9;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.form-box button:disabled{
  background:#1e293b;
  cursor:not-allowed;
  opacity: 0.6;
}

.form-box button:hover:not(:disabled){
  background:#0284c7;
}

.sucesso{
  color:#22c55e;
  text-align:center;
  margin-top:15px;
  min-height:20px;
}

/* MENU MOBILE */
.menu-toggle{
  display:none;
  font-size:24px;
  color:#38bdf8;
  cursor:pointer;
}

@media(max-width:768px){
  .menu{
    display:none;
    flex-direction:column;
    position:absolute;
    top:60px;
    right:20px;
    background:#020617;
    padding:15px;
    border-radius:8px;
    border:1px solid #1e293b;
  }
  .menu a{margin:10px 0;}
  .menu.show{display:flex;}
  .menu-toggle{display:block;}
}
</style>

</head>

<body>

<header>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Logo Escola">
      <strong>EEEFM Estudo e Trabalho</strong>
    </div>

    <div class="menu-toggle" id="menuToggle">&#9776;</div>

    <nav class="menu" id="menuNav">
      <a href="index.html">Início</a>
      <a href="login.html">Portal do Aluno</a>
      <a href="login-professor.html">Área de Professores</a>
      <a href="matricula.html">Matrícula</a>
    </nav>
  </div>
</header>

<div class="form-box">
<h2>📚 Pré-Matrícula</h2>

<form id="formMatricula">

<label for="nome">Nome do aluno</label>
<input type="text" id="nome" placeholder="Digite o nome do aluno" required autocomplete="name">

<label for="data">Data de nascimento</label>
<input type="date" id="data" required>

<label for="serie">Série</label>
<select id="serie" required>
<option value="">Selecione</option>
<option value="6 Ano">6º Ano</option>
<option value="7 Ano">7º Ano</option>
<option value="8 Ano">8º Ano</option>
<option value="9 Ano">9º Ano</option>
<option value="1 Médio">1º Médio</option>
<option value="2 Médio">2º Médio</option>
<option value="3 Médio">3º Médio</option>
</select>

<button type="submit" id="btnEnviar">Enviar matrícula</button>
<div id="msg" class="sucesso"></div>

</form>
</div>

<script src="js/script.js"></script>

<script>
// MENU MOBILE - Corrigido para garantir funcionamento estável
const menuToggle = document.getElementById("menuToggle");
const menuNav = document.getElementById("menuNav");

if(menuToggle && menuNav) {
    menuToggle.addEventListener("click", () => {
        menuNav.classList.toggle("show");
    });
}

// FORMULARIO - Corrigido fluxo de estados e console errors
const form = document.getElementById("formMatricula");
const btn = document.getElementById("btnEnviar");
const msg = document.getElementById("msg");

if(form) {
    form.addEventListener("submit", (e) => {
        e.preventDefault();

        // BUG FIX: Garantindo a captura correta dos elementos
        const nomeInput = document.getElementById("nome");
        const dataInput = document.getElementById("data");
        const serieInput = document.getElementById("serie");

        if(!nomeInput || !dataInput || !serieInput) return;

        let nome = nomeInput.value;
        let data = dataInput.value;
        let serie = serieInput.value;

        // Limpa mensagem anterior se houver
        msg.innerText = "";

        if(!nome || !data || !serie){
            alert("Preencha todos os campos");
            return;
        }

        // Estado de carregamento (Produção)
        btn.innerText = "Enviando...";
        btn.disabled = true;

        // BUG FIX: Adicionado tratamento visual para feedback do usuário
        setTimeout(()=>{
            msg.innerText = "✅ Matrícula enviada com sucesso!";
            form.reset();
            btn.innerText = "Enviar matrícula";
            btn.disabled = false;
            
            // Opcional: Limpar mensagem após 5 segundos
            setTimeout(() => { msg.innerText = ""; }, 5000);
        }, 1500);
    });
}
</script>

</body>
</html>
