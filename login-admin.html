<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrativo</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* Mantido CSS original conforme solicitado */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#020617);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:white;}

header{
  background:#020617;
  padding:15px 0;
  border-bottom:1px solid #1e293b;
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
}
header .container{
  max-width:1200px;
  margin:auto;
  padding:0 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#38bdf8;
  font-weight:bold;
}
.logo img{width:45px;}
.menu{display:flex;gap:15px;}
.menu a{color:#cbd5f5;text-decoration:none;transition:0.3s;}
.menu a:hover{color:#38bdf8;}
.menu-toggle{display:none;font-size:24px;color:#38bdf8;cursor:pointer;}

.login-box{
  width:100%;
  max-width:400px;
  background:#020617;
  padding:35px;
  border-radius:12px;
  border:1px solid #1e293b;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  text-align:center;
  margin:150px auto 0 auto;
}
.login-box h2{margin-bottom:20px;color:#38bdf8;}
input{width:100%;padding:12px;margin-top:12px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:white;}
input:focus{outline:none;border-color:#38bdf8;}
button{width:100%;padding:12px;margin-top:15px;border:none;border-radius:8px;background:#0ea5e9;color:white;font-weight:bold;cursor:pointer;transition:0.2s;}
button:hover{background:#0284c7;}
.loading{opacity:0.6;pointer-events:none;}
.erro{color:#ef4444;margin-top:10px;font-size:14px;}

@media(max-width:768px){
  .menu{display:none;flex-direction:column;position:absolute;top:60px;right:20px;background:#020617;padding:10px;border-radius:8px;}
  .menu.show{display:flex;}
  .menu-toggle{display:block;}
}
</style>
</head>

<body>

<header>
<div class="container">
  <div class="logo">
    <img src="logo.png" alt="Logo Escola"> EEEFM Estudo e Trabalho
  </div>

  <div class="menu-toggle" id="menuToggle">&#9776;</div>

  <nav class="menu" id="menuNav">
    <a href="index.html">Início</a>
    <a href="noticias.html">Notícias</a>
    <a href="login.html">Aluno</a>
    <a href="login-professor.html">Professor</a>
  </nav>
</div>
</header>

<div class="login-box" id="loginBox">
  <h2>Login Administrativo</h2>
  <input id="usuario" placeholder="Usuário" autocomplete="username">
  <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
  <button id="btnLogin">Entrar</button>
  <div id="erro" class="erro"></div>
</div>

<script>
// BUG FIX: API original mantida, mas preparada para falhas de rede
const API="https://portal-escola-backend.onrender.com"

// MENU MOBILE
const menuToggle=document.getElementById("menuToggle")
const menuNav=document.getElementById("menuNav")
if(menuToggle) {
    menuToggle.onclick=()=>menuNav.classList.toggle("show")
}

// LOGIN
const btnLogin=document.getElementById("btnLogin")
const erro=document.getElementById("erro")

// BUG FIX: Declarada como função nomeada para ser chamada pelo evento de tecla
async function loginAdmin(){
  if(!erro) return;
  erro.innerText=""
  
  const usuarioInput = document.getElementById("usuario")
  const senhaInput = document.getElementById("senha")
  
  if(!usuarioInput || !senhaInput) return;

  let usuario = usuarioInput.value
  let senha = senhaInput.value

  if(!usuario || !senha){
      erro.innerText="Preencha usuário e senha";
      return;
  }

  btnLogin.classList.add("loading")
  btnLogin.innerText="Entrando..."

  try{
    localStorage.clear()
    // BUG FIX: Adicionado timeout manual para evitar que o botão fique travado em "Entrando..." para sempre
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    let res = await fetch(API+"/login-admin",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({usuario,senha}),
      signal: controller.signal
    })

    clearTimeout(timeoutId);

    if(!res.ok){
        erro.innerText="Usuário ou senha inválidos"; // Ajustado para ser mais genérico por segurança
        resetBotao();
        return;
    }

    let data=await res.json()
    if(data.success){
      localStorage.setItem("token",data.token)
      localStorage.setItem("usuario",JSON.stringify({usuario,tipo:"admin"}))
      window.location.href="admin.html" // Adicionado .href por padrão de produção
    }else{
      erro.innerText="Usuário ou senha inválidos"
    }

  }catch(err){
    console.error("Erro de Console:", err)
    erro.innerText="Erro ao conectar com o servidor"
  }

  resetBotao();
}

function resetBotao() {
    btnLogin.classList.remove("loading")
    btnLogin.innerText="Entrar"
}

// EVENTOS
if(btnLogin) {
    btnLogin.onclick = loginAdmin;
}

// BUG FIX: Corrigido o erro de referência. O "Enter" agora chama a função corretamente.
document.addEventListener("keypress",(e)=>{
    if(e.key==="Enter") {
        loginAdmin();
    }
})
</script>

</body>
</html>
