<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Administrativo</title>

<style>
body{
background:linear-gradient(135deg,#0f172a,#020617);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:'Segoe UI',sans-serif;
color:white;
}

/* BOX LOGIN */
.login-box{
width:100%;
max-width:400px;
background:#020617;
padding:35px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#38bdf8;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:white;
}

input:focus{
outline:none;
border-color:#38bdf8;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0284c7;
}

.loading{
opacity:0.6;
pointer-events:none;
}

.erro{
color:#ef4444;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login Administrativo</h2>

<input id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">

<button id="btnLogin">Entrar</button>
<div id="erro" class="erro"></div>

</div>

<script>
const API = "https://portal-escola-backend.onrender.com"

const btn = document.getElementById("btnLogin")
const erro = document.getElementById("erro")

btn.onclick = loginAdmin

async function loginAdmin(){

erro.innerText=""

let usuario = document.getElementById("usuario").value
let senha = document.getElementById("senha").value

if(!usuario || !senha){
erro.innerText="Preencha usuário e senha"
return
}

btn.classList.add("loading")
btn.innerText="Entrando..."

try{
localStorage.clear()

let res = await fetch(API + "/login-admin",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({usuario,senha})
})

if(!res.ok){
erro.innerText="Servidor indisponível"
btn.classList.remove("loading")
btn.innerText="Entrar"
return
}

let data = await res.json()

if(data.success){
localStorage.setItem("token",data.token)
localStorage.setItem("usuario",JSON.stringify({usuario,tipo:"admin"}))
window.location="admin.html"
}else{
erro.innerText="Usuário ou senha inválidos"
}

}catch(err){
console.error(err)
erro.innerText="Erro ao conectar com servidor"
}

btn.classList.remove("loading")
btn.innerText="Entrar"
}

// permitir ENTER
document.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
loginAdmin()
}
})
</script>

</body>
</html>
