<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Administrativo</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f1f3f6;
font-family:Arial, Helvetica, sans-serif;
}

.login-box{
max-width:400px;
margin:120px auto;
background:white;
padding:35px;
border-radius:8px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#0a2a66;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.login-box button{
width:100%;
margin-top:15px;
padding:12px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#1c4cb3;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="login.html">Portal do Aluno</a>
<a href="login-professor.html">Portal do Professor</a>
</div>

</nav>

</div>

</header>


<div class="login-box">

<h2>Login Administrativo</h2>

<input id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="loginAdmin()">Entrar</button>

</div>


<script>

const API = "https://portal-escola-backend.onrender.com"

async function loginAdmin(){

let usuario = document.getElementById("usuario").value
let senha = document.getElementById("senha").value

if(!usuario || !senha){

alert("Preencha usuário e senha")
return

}

try{

// limpa sessão antiga
localStorage.clear()

let res = await fetch(API + "/login-admin",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
usuario,
senha
})

})

// verifica erro servidor
if(!res.ok){

alert("Servidor indisponível")
return

}

let data = await res.json()

if(data.success){

localStorage.setItem("token",data.token)
localStorage.setItem("adminLogado","true")
localStorage.setItem("tipo","admin")

window.location="admin.html"

}else{

alert("Usuário ou senha inválidos")

}

}catch(err){

console.error(err)

alert("Erro ao conectar com servidor")

}

}

// permitir ENTER para logar
document.addEventListener("keypress",function(e){

if(e.key === "Enter"){
loginAdmin()
}

})

</script>

</body>
</html>
