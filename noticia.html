<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícia</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f172a;
color:white;
}

.noticia-container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* CARD */
.card{
background:#020617;
padding:25px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* TITULO */
.titulo{
font-size:30px;
color:#38bdf8;
margin-bottom:10px;
}

/* DATA */
.data{
color:#94a3b8;
font-size:14px;
margin-bottom:20px;
}

/* IMAGEM */
.imagem{
width:100%;
max-height:450px;
object-fit:cover;
border-radius:10px;
margin-bottom:20px;
}

/* CONTEUDO */
.conteudo{
line-height:1.7;
font-size:17px;
}

/* BOTÃO */
.voltar{
margin-top:25px;
display:inline-block;
padding:10px 20px;
background:#0ea5e9;
color:white;
border-radius:8px;
text-decoration:none;
transition:0.2s;
}

.voltar:hover{
background:#0284c7;
}

/* LOADING */
.loading{
text-align:center;
margin-top:50px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="noticias.html">Notícias</a>
</div>

</nav>

</div>

</header>

<div class="noticia-container">

<div class="card">

<div id="loading" class="loading">Carregando notícia...</div>

<h1 class="titulo" id="titulo" style="display:none;"></h1>

<div class="data" id="data"></div>

<img id="imagem" class="imagem" style="display:none">

<div id="conteudo" class="conteudo"></div>

<a href="noticias.html" class="voltar">⬅ Voltar</a>

</div>

</div>

<script>

const API = "https://portal-escola-backend.onrender.com"

function pegarId(){
const params = new URLSearchParams(window.location.search)
return params.get("id")
}

async function carregarNoticia(){

let loading = document.getElementById("loading")

try{

let id = pegarId()

if(!id){
loading.innerText = "Notícia não encontrada"
return
}

let res = await fetch(API + "/publicacoes")

if(!res.ok){
throw new Error("Erro API")
}

let dados = await res.json()

let noticia = dados.find(p => p.id == id)

if(!noticia){
loading.innerText = "Notícia não encontrada"
return
}

loading.style.display = "none"

document.getElementById("titulo").style.display = "block"
document.getElementById("titulo").innerText = noticia.titulo || ""

document.getElementById("data").innerText =
noticia.data_publicacao
? new Date(noticia.data_publicacao).toLocaleDateString()
: ""

document.getElementById("conteudo").innerHTML = noticia.conteudo || ""

if(noticia.imagem){

let img = document.getElementById("imagem")
img.src = noticia.imagem
img.style.display = "block"

}

}catch(err){

console.error(err)
loading.innerText = "Erro ao carregar notícia"

}

}

document.addEventListener("DOMContentLoaded", carregarNoticia)

</script>

</body>
</html>
