<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícia</title>

<link rel="stylesheet" href="style.css">

<style>
/* Mantendo 100% da sua estrutura original de CSS */
body{
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.noticia-container{
max-width:900px;
margin:auto;
padding:120px 20px 40px 20px; /* Ajustado para não ficar sob o header fixo */
}

/* CARD */
.card{
background:#020617;
padding:25px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* TITULO */
.titulo{
font-size:30px;
color:#38bdf8;
margin-bottom:10px;
}

/* DATA */
.data{
color:#94a3b8;
font-size:14px;
margin-bottom:20px;
}

/* IMAGEM */
.imagem{
width:100%;
max-height:450px;
object-fit:cover;
border-radius:10px;
margin-bottom:20px;
}

/* CONTEUDO */
.conteudo{
line-height:1.7;
font-size:17px;
}

/* BOTÃO */
.voltar{
margin-top:25px;
display:inline-block;
padding:10px 20px;
background:#0ea5e9;
color:white;
border-radius:8px;
text-decoration:none;
transition:0.2s;
}

.voltar:hover{
background:#0284c7;
}

/* LOADING */
.loading{
text-align:center;
margin-top:50px;
color:#94a3b8;
}

/* Ajuste básico de Header */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  z-index: 1000;
  padding: 10px 0;
}
.container nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 900px;
  margin: auto;
  padding: 0 20px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo img { width: 40px; }
.menu a { color: white; text-decoration: none; margin-left: 15px; }

</style>

</head>

<body>

<header>
<div class="container">
<nav>
<div class="logo">
<img src="logo.png" alt="Logo">
<strong>EEEFM Estudo e Trabalho</strong>
</div>
<div class="menu">
<a href="index.html">Início</a>
<a href="noticias.html">Notícias</a>
</div>
</nav>
</div>
</header>

<div class="noticia-container">

<div class="card">

<div id="loading" class="loading">Carregando notícia...</div>

<h1 class="titulo" id="titulo" style="display:none;"></h1>

<div class="data" id="data"></div>

<img id="imagem" class="imagem" style="display:none" alt="Imagem da notícia">

<div id="conteudo" class="conteudo"></div>

<a href="noticias.html" class="voltar">⬅ Voltar</a>

</div>

</div>

<script>

const API = "https://portal-escola-backend.onrender.com"

function pegarId(){
const params = new URLSearchParams(window.location.search)
return params.get("id")
}

async function carregarNoticia(){

let loading = document.getElementById("loading")
let tituloElem = document.getElementById("titulo")
let dataElem = document.getElementById("data")
let conteudoElem = document.getElementById("conteudo")
let imagemElem = document.getElementById("imagem")

try{

let id = pegarId()

if(!id){
loading.innerText = "ID da notícia não fornecido"
return
}

let res = await fetch(API + "/publicacoes")

if(!res.ok){
throw new Error("Erro ao conectar com a API")
}

let dados = await res.json()

// Garantindo comparação de ID independente de tipo (string/number)
let noticia = dados.find(p => String(p.id) === String(id))

if(!noticia){
loading.innerText = "Notícia não encontrada no banco de dados"
return
}

// Sucesso: Esconder loading e mostrar dados
loading.style.display = "none"

tituloElem.style.display = "block"
tituloElem.innerText = noticia.titulo || "Sem título"

dataElem.innerText = noticia.data_publicacao
? new Date(noticia.data_publicacao).toLocaleDateString('pt-BR')
: ""

conteudoElem.innerHTML = noticia.conteudo || "Sem conteúdo disponível."

if(noticia.imagem && noticia.imagem.trim() !== ""){
imagemElem.src = noticia.imagem
imagemElem.style.display = "block"
}

}catch(err){

console.error("Erro de console:", err)
loading.style.color = "#ef4444"
loading.innerText = "Erro ao carregar notícia. Tente novamente mais tarde."

}

}

document.addEventListener("DOMContentLoaded", carregarNoticia)

</script>

</body>
</html>
