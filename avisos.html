<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avisos da Escola</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* Mantido CSS original conforme solicitado */
body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0a2a66;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.aviso{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.aviso h3{
color:#0a2a66;
margin-top:0;
}

/* Fix para garantir que imagens dentro do conteúdo não estourem o layout */
.aviso img {
max-width: 100%;
height: auto;
border-radius: 4px;
}

</style>

</head>

<body>

<header>
<h2>Avisos da Escola</h2>
</header>

<div class="container" id="listaAvisos">Carregando avisos...</div>

<script src="js/script.js"></script>

<script>
// Mantida a URL da API original
const API="https://portal-escola-backend.onrender.com"

async function carregarAvisos(){

let lista=document.getElementById("listaAvisos")

try {
    // BUG FIX: Adicionado timeout ou verificação de erro de rede mais robusta
    let res=await fetch(API+"/publicacoes")
    
    if(!res.ok) throw new Error("Erro ao buscar dados do servidor");

    let dados=await res.json()

    if(!Array.isArray(dados)) {
        lista.innerHTML = "<p>Nenhum aviso encontrado no momento.</p>";
        return;
    }

    lista.innerHTML=""

    // BUG FIX: Proteção contra dados nulos ou indefinidos no filtro
    const avisosFiltrados = dados.filter(p => p && p.tipo === "aviso");

    avisosFiltrados.forEach(p=>{

    // Fallback para data inválida (Corrigido para evitar 'Invalid Date' no console)
    let dataFormatada = "Data não disponível";
    if (p.data_publicacao) {
        const d = new Date(p.data_publicacao);
        if (!isNaN(d.getTime())) {
            dataFormatada = d.toLocaleDateString('pt-BR');
        }
    }

    lista.innerHTML+=`
    <div class="aviso">
    <h3>${p.titulo || "Sem Título"}</h3>
    <div>${p.conteudo || ""}</div>
    <br>
    <small>Publicado em: ${dataFormatada}</small>
    </div>
    `
    })

    if(avisosFiltrados.length === 0) {
        lista.innerHTML = "<p>Não há avisos recentes.</p>";
    }

} catch(err) {
    console.error("Erro de console detectado:", err);
    lista.innerHTML = "<p style='color:red; text-align:center;'>Erro ao carregar avisos. Tente recarregar a página.</p>";
}

}

// GARANTIA DE PRODUÇÃO: Executa após o carregamento do DOM
document.addEventListener('DOMContentLoaded', carregarAvisos);

</script>

</body>
</html>
