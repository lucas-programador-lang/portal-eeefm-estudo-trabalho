<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avisos da Escola</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0a2a66;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.aviso{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.aviso h3{
color:#0a2a66;
margin-top:0;
}

</style>

</head>

<body>

<header>
<h2>Avisos da Escola</h2>
</header>

<div class="container" id="listaAvisos">Carregando avisos...</div>

<script>

const API="https://portal-escola-backend.onrender.com"

async function carregarAvisos(){

let lista=document.getElementById("listaAvisos")

try {
    let res=await fetch(API+"/publicacoes")
    
    // Verificação de erro na resposta da rede
    if(!res.ok) throw new Error("Erro ao buscar dados");

    let dados=await res.json()

    // Garante que 'dados' seja um array antes de filtrar
    if(!Array.isArray(dados)) {
        lista.innerHTML = "<p>Nenhum aviso encontrado no momento.</p>";
        return;
    }

    lista.innerHTML=""

    dados
    .filter(p=>p.tipo==="aviso")
    .forEach(p=>{

    // Fallback para data inválida
    const dataFormatada = p.data_publicacao 
        ? new Date(p.data_publicacao).toLocaleDateString() 
        : "Data não disponível";

    lista.innerHTML+=`
    <div class="aviso">
    <h3>${p.titulo}</h3>
    <div>${p.conteudo}</div>
    <br>
    <small>${dataFormatada}</small>
    </div>
    `
    })

    if(lista.innerHTML === "") {
        lista.innerHTML = "<p>Não há avisos recentes.</p>";
    }

} catch(err) {
    console.error("Erro de conexão:", err);
    lista.innerHTML = "<p style='color:red;'>Erro ao carregar avisos. Verifique sua conexão.</p>";
}

}

carregarAvisos()

</script>

</body>
</html>
