
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avisos da Escola</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0a2a66;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.aviso{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.aviso h3{
color:#0a2a66;
margin-top:0;
}

</style>

</head>

<body>

<header>
<h2>Avisos da Escola</h2>
</header>

<div class="container" id="listaAvisos"></div>

<script>

const API="https://portal-escola-backend.onrender.com"

async function carregarAvisos(){

let res=await fetch(API+"/publicacoes")
let dados=await res.json()

let lista=document.getElementById("listaAvisos")

lista.innerHTML=""

dados
.filter(p=>p.tipo==="aviso")
.forEach(p=>{

lista.innerHTML+=`

<div class="aviso">

<h3>${p.titulo}</h3>

<p>${p.conteudo}</p>

<small>${new Date(p.data_publicacao).toLocaleDateString()}</small>

</div>

`

})

}

carregarAvisos()

</script>

</body>
</html>
