<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícias da Escola</title>

<link rel="stylesheet" href="style.css">

<style>

.noticias-container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.busca{
margin:20px 0;
}

.busca input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.destaque{
background:white;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
overflow:hidden;
margin-bottom:30px;
cursor:pointer;
}

.destaque img{
width:100%;
max-height:400px;
object-fit:cover;
}

.destaque-conteudo{
padding:20px;
}

.slider{
display:flex;
overflow-x:auto;
gap:15px;
margin-bottom:30px;
}

.slider::-webkit-scrollbar{
height:6px;
}

.slider::-webkit-scrollbar-thumb{
background:#ccc;
border-radius:4px;
}

.slider-card{
min-width:250px;
background:white;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
overflow:hidden;
}

.slider-card img{
width:100%;
height:150px;
object-fit:cover;
}

.slider-card h4{
padding:10px;
font-size:14px;
}

.aviso-diretor{
background:#ffd43b;
padding:15px;
margin-bottom:20px;
border-left:6px solid #e0b800;
font-weight:bold;
}

.noticia-card{
background:white;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
overflow:hidden;
cursor:pointer;
}

.noticia-card img{
width:100%;
max-height:350px;
object-fit:cover;
}

.noticia-conteudo{
padding:20px;
}

.data{
font-size:12px;
color:#666;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="noticias.html">Notícias</a>
<a href="login.html">Portal do Aluno</a>
<a href="login-professor.html">Portal do Professor</a>
</div>

</nav>

</div>

</header>


<div class="noticias-container">

<h2>Notícias e Avisos da Escola</h2>

<div class="busca">
<input id="busca" placeholder="Buscar notícia..." oninput="filtrarNoticias()">
</div>

<div id="avisos"></div>

<div id="destaque"></div>

<div class="slider" id="sliderNoticias"></div>

<div id="noticias"></div>

</div>


<script>

const API = "https://portal-escola-backend.onrender.com"

let todasNoticias = []

async function carregarNoticias(){

try{

let res = await fetch(API + "/publicacoes")

let dados = await res.json()

let avisosDiv = document.getElementById("avisos")
let noticiasDiv = document.getElementById("noticias")
let destaqueDiv = document.getElementById("destaque")
let sliderDiv = document.getElementById("sliderNoticias")

avisosDiv.innerHTML=""
noticiasDiv.innerHTML=""
destaqueDiv.innerHTML=""
sliderDiv.innerHTML=""

todasNoticias = dados.filter(p=>p.tipo==="noticia")

dados.forEach(p=>{

let data = new Date(p.data_publicacao).toLocaleDateString()

if(p.tipo==="aviso"){

avisosDiv.innerHTML += `
<div class="aviso-diretor">
📢 ${p.titulo}<br>
${p.conteudo}
<div class="data">${data}</div>
</div>
`

}

})

if(todasNoticias.length){

let destaque = todasNoticias[0]

destaqueDiv.innerHTML = `
<div class="destaque" onclick="abrirNoticia(${destaque.id})">

${destaque.imagem ? `<img src="${destaque.imagem}">` : ""}

<div class="destaque-conteudo">
<h2>${destaque.titulo}</h2>
<p>${destaque.conteudo.substring(0,150)}...</p>
</div>

</div>
`

}

todasNoticias.forEach(p=>{

sliderDiv.innerHTML += `
<div class="slider-card" onclick="abrirNoticia(${p.id})">

${p.imagem ? `<img src="${p.imagem}">` : ""}

<h4>${p.titulo}</h4>

</div>
`

})

renderNoticias(todasNoticias)

}catch(err){

console.log("Erro ao carregar notícias")

}

}

function renderNoticias(lista){

let noticiasDiv = document.getElementById("noticias")

noticiasDiv.innerHTML=""

lista.forEach(p=>{

let data = new Date(p.data_publicacao).toLocaleDateString()

noticiasDiv.innerHTML += `
<div class="noticia-card" onclick="abrirNoticia(${p.id})">

${p.imagem ? `<img src="${p.imagem}">` : ""}

<div class="noticia-conteudo">

<h3>${p.titulo}</h3>

<p>${p.conteudo.substring(0,200)}...</p>

<div class="data">${data}</div>

</div>

</div>
`

})

}

function filtrarNoticias(){

let busca = document.getElementById("busca").value.toLowerCase()

let filtradas = todasNoticias.filter(n =>
n.titulo.toLowerCase().includes(busca) ||
n.conteudo.toLowerCase().includes(busca)
)

renderNoticias(filtradas)

}

function abrirNoticia(id){

window.location = "noticia.html?id=" + id

}

carregarNoticias()

</script>

</body>
</html>
