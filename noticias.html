<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícias da Escola</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f172a;
color:white;
}

.noticias-container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* BUSCA */
.busca input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

/* DESTAQUE */
.destaque{
background:#020617;
border-radius:12px;
overflow:hidden;
margin-bottom:30px;
cursor:pointer;
border:1px solid #1e293b;
transition:0.3s;
}

.destaque:hover{
transform:scale(1.01);
}

.destaque img{
width:100%;
max-height:350px;
object-fit:cover;
}

.destaque-conteudo{
padding:20px;
}

/* SLIDER */
.slider{
display:flex;
overflow-x:auto;
gap:15px;
margin-bottom:30px;
}

.slider-card{
min-width:240px;
background:#020617;
border-radius:10px;
border:1px solid #1e293b;
cursor:pointer;
transition:0.3s;
}

.slider-card:hover{
transform:scale(1.05);
}

.slider-card img{
width:100%;
height:140px;
object-fit:cover;
}

.slider-card h4{
padding:10px;
font-size:14px;
}

/* AVISO */
.aviso-diretor{
background:#facc15;
color:black;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}

/* NOTÍCIAS */
.noticia-card{
background:#020617;
border-radius:12px;
margin-bottom:25px;
border:1px solid #1e293b;
cursor:pointer;
transition:0.3s;
}

.noticia-card:hover{
transform:translateY(-4px);
}

.noticia-card img{
width:100%;
max-height:300px;
object-fit:cover;
}

.noticia-conteudo{
padding:20px;
}

.data{
font-size:12px;
color:#94a3b8;
margin-top:10px;
}

/* LOADING */
.loading{
text-align:center;
margin-top:30px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">
<img src="logo.png">
<strong>EEEFM Estudo e Trabalho</strong>
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="noticias.html">Notícias</a>
<a href="login.html">Portal do Aluno</a>
<a href="login-professor.html">Portal do Professor</a>
</div>

</nav>

</div>

</header>

<div class="noticias-container">

<h2>📰 Notícias e Avisos</h2>

<div class="busca">
<input id="busca" placeholder="Buscar..." oninput="filtrarNoticias()">
</div>

<div id="avisos"></div>
<div id="destaque"></div>
<div class="slider" id="sliderNoticias"></div>
<div id="noticias"></div>

<div id="loading" class="loading">Carregando...</div>

</div>

<script>

const API = "https://portal-escola-backend.onrender.com"

let todasNoticias = []

async function carregarNoticias(){

let loading = document.getElementById("loading")

try{

let res = await fetch(API + "/publicacoes")
let dados = await res.json()

loading.style.display = "none"

dados.sort((a,b)=> new Date(b.data_publicacao) - new Date(a.data_publicacao))

let avisosDiv = document.getElementById("avisos")
let destaqueDiv = document.getElementById("destaque")
let sliderDiv = document.getElementById("sliderNoticias")

avisosDiv.innerHTML=""
destaqueDiv.innerHTML=""
sliderDiv.innerHTML=""

todasNoticias = dados.filter(p=>p.tipo==="noticia")

/* AVISOS */
dados.forEach(p=>{
if(p.tipo==="aviso"){
avisosDiv.innerHTML += `
<div class="aviso-diretor">
📢 <strong>${p.titulo}</strong><br>
${p.conteudo || ""}
</div>
`
}
})

/* DESTAQUE */
if(todasNoticias.length){

let d = todasNoticias[0]

destaqueDiv.innerHTML = `
<div class="destaque" onclick="abrirNoticia(${d.id})">
${d.imagem ? `<img src="${d.imagem}">` : ""}
<div class="destaque-conteudo">
<h2>${d.titulo}</h2>
<p>${(d.conteudo || "").substring(0,150)}...</p>
</div>
</div>
`

}

/* SLIDER */
todasNoticias.forEach(p=>{
sliderDiv.innerHTML += `
<div class="slider-card" onclick="abrirNoticia(${p.id})">
${p.imagem ? `<img src="${p.imagem}">` : ""}
<h4>${p.titulo}</h4>
</div>
`
})

renderNoticias(todasNoticias)

}catch{
document.getElementById("loading").innerText="Erro ao carregar"
}

}

/* LISTA */
function renderNoticias(lista){

let noticiasDiv = document.getElementById("noticias")
noticiasDiv.innerHTML=""

lista.forEach(p=>{

noticiasDiv.innerHTML += `
<div class="noticia-card" onclick="abrirNoticia(${p.id})">
${p.imagem ? `<img src="${p.imagem}">` : ""}
<div class="noticia-conteudo">
<h3>${p.titulo}</h3>
<p>${(p.conteudo || "").substring(0,200)}...</p>
</div>
</div>
`

})

}

/* BUSCA */
function filtrarNoticias(){

let busca = document.getElementById("busca").value.toLowerCase()

let filtradas = todasNoticias.filter(n =>
(n.titulo || "").toLowerCase().includes(busca) ||
(n.conteudo || "").toLowerCase().includes(busca)
)

renderNoticias(filtradas)

}

/* ABRIR */
function abrirNoticia(id){
window.location = "noticia.html?id=" + id
}

carregarNoticias()

</script>

</body>
</html>
