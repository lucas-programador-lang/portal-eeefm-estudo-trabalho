<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícias da Escola</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* Mantendo 100% da sua estrutura original de CSS */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;}

header{
  background:#020617;
  padding:15px;
  border-bottom:1px solid #1e293b;
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

.container nav{
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:40px;}
.logo strong{color:#38bdf8;font-size:18px;}

.menu a{color:white;text-decoration:none;margin-left:15px;font-size:14px;}
.menu a:hover{color:#38bdf8;}

.noticias-container{
max-width:1100px;
margin:auto;
padding:100px 20px 40px 20px; /* Ajuste para o header fixo */
}

/* BUSCA */
.busca{margin-bottom: 25px;}
.busca input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

/* DESTAQUE */
.destaque{
background:#020617;
border-radius:12px;
overflow:hidden;
margin-bottom:30px;
cursor:pointer;
border:1px solid #1e293b;
transition:0.3s;
}

.destaque:hover{transform:scale(1.01);}
.destaque img{width:100%;max-height:350px;object-fit:cover; display: block;}
.destaque-conteudo{padding:20px;}

/* SLIDER */
.slider{
display:flex;
overflow-x:auto;
gap:15px;
margin-bottom:30px;
padding-bottom:10px;
/* BUG FIX: Melhoria na rolagem para dispositivos móveis */
-webkit-overflow-scrolling: touch;
}

.slider-card{
min-width:240px;
background:#020617;
border-radius:10px;
border:1px solid #1e293b;
cursor:pointer;
transition:0.3s;
}

.slider-card:hover{transform:scale(1.05);}
.slider-card img{width:100%;height:140px;object-fit:cover;border-radius:10px 10px 0 0; display: block;}
.slider-card h4{padding:10px;font-size:14px;}

/* AVISO */
.aviso-diretor{
background:#facc15;
color:black;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}

/* NOTÍCIAS */
.noticia-card{
background:#020617;
border-radius:12px;
margin-bottom:25px;
border:1px solid #1e293b;
cursor:pointer;
transition:0.3s;
}

.noticia-card:hover{transform:translateY(-4px);}
.noticia-card img{width:100%;max-height:300px;object-fit:cover;border-radius:12px 12px 0 0; display: block;}
.noticia-conteudo{padding:20px;}

/* LOADING */
.loading{text-align:center;margin-top:30px;color:#94a3b8;}
</style>

</head>

<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">
        <img src="logo.png" alt="Logo Escola">
        <strong>EEEFM Estudo e Trabalho</strong>
      </div>
      <div class="menu">
        <a href="index.html">Início</a>
        <a href="noticias.html">Notícias</a>
        <a href="login.html">Portal do Aluno</a>
        <a href="login-professor.html">Portal do Professor</a>
      </div>
    </nav>
  </div>
</header>

<div class="noticias-container">

<h2>📰 Notícias e Avisos</h2>

<div class="busca">
<input id="busca" placeholder="Buscar por título ou conteúdo..." oninput="filtrarNoticias()">
</div>

<div id="avisos"></div>
<div id="destaque"></div>
<div class="slider" id="sliderNoticias"></div>
<div id="noticias"></div>

<div id="loading" class="loading">Carregando notícias...</div>

</div>

<script src="js/script.js"></script>

<script>
const API = "https://portal-escola-backend.onrender.com"
let todasNoticias = []

async function carregarNoticias(){
    const loading = document.getElementById("loading")

    try{
        let res = await fetch(API + "/publicacoes")
        if(!res.ok) throw new Error("Erro na API");

        let dados = await res.json()
        
        if(!Array.isArray(dados)) {
            throw new Error("Dados inválidos recebidos");
        }

        loading.style.display = "none"

        // Ordenação segura por data
        dados.sort((a,b)=> {
            const dataA = a.data_publicacao ? new Date(a.data_publicacao) : 0;
            const dataB = b.data_publicacao ? new Date(b.data_publicacao) : 0;
            return dataB - dataA;
        });

        const avisosDiv = document.getElementById("avisos")
        const destaqueDiv = document.getElementById("destaque")
        const sliderDiv = document.getElementById("sliderNoticias")

        avisosDiv.innerHTML=""
        destaqueDiv.innerHTML=""
        sliderDiv.innerHTML=""

        // Filtragem para garantir que apenas notícias entrem na lista principal
        todasNoticias = dados.filter(p => p && p.tipo === "noticia")

        /* AVISOS */
        dados.forEach(p=>{
            if(p && p.tipo === "aviso"){
                avisosDiv.innerHTML += `
                    <div class="aviso-diretor">
                    📢 <strong>${p.titulo || "Aviso"}</strong><br>
                    ${p.conteudo || ""}
                    </div>`
            }
        })

        /* DESTAQUE - Primeira notícia da lista */
        if(todasNoticias.length > 0){
            let d = todasNoticias[0]
            let resumoDestaque = (d.conteudo || "").replace(/<[^>]*>?/gm, ''); 

            destaqueDiv.innerHTML = `
                <div class="destaque" onclick="abrirNoticia('${d.id}')">
                ${(d.imagem && d.imagem !== "null") ? `<img src="${d.imagem}" onerror="this.style.display='none'">` : ""}
                <div class="destaque-conteudo">
                <h2>${d.titulo || "Sem título"}</h2>
                <p>${resumoDestaque.substring(0,150)}...</p>
                </div>
                </div>`
        }

        /* SLIDER */
        todasNoticias.forEach(p=>{
            sliderDiv.innerHTML += `
                <div class="slider-card" onclick="abrirNoticia('${p.id}')">
                ${(p.imagem && p.imagem !== "null") ? `<img src="${p.imagem}" onerror="this.style.display='none'">` : ""}
                <h4>${p.titulo || "Sem título"}</h4>
                </div>`
        })

        renderNoticias(todasNoticias)

    }catch(err){
        console.error("Erro de Console:", err);
        const loadingElem = document.getElementById("loading");
        if(loadingElem) {
            loadingElem.innerText="Erro ao carregar notícias. Verifique sua conexão.";
            loadingElem.style.color = "#ef4444";
        }
    }
}

/* LISTA */
function renderNoticias(lista){
    const noticiasDiv = document.getElementById("noticias")
    if(!noticiasDiv) return;
    
    noticiasDiv.innerHTML=""

    if(lista.length === 0) {
        noticiasDiv.innerHTML = "<p class='loading'>Nenhuma notícia encontrada.</p>";
        return;
    }

    lista.forEach(p=>{
        let resumo = (p.conteudo || "").replace(/<[^>]*>?/gm, ''); 

        noticiasDiv.innerHTML += `
            <div class="noticia-card" onclick="abrirNoticia('${p.id}')">
            ${(p.imagem && p.imagem !== "null") ? `<img src="${p.imagem}" onerror="this.style.display='none'">` : ""}
            <div class="noticia-conteudo">
            <h3>${p.titulo || "Sem título"}</h3>
            <p>${resumo.substring(0,200)}...</p>
            </div>
            </div>`
    })
}

/* BUSCA */
function filtrarNoticias(){
    const buscaInput = document.getElementById("busca")
    if(!buscaInput) return;
    
    let busca = buscaInput.value.toLowerCase()

    let filtradas = todasNoticias.filter(n =>
        (n.titulo || "").toLowerCase().includes(busca) ||
        (n.conteudo || "").toLowerCase().includes(busca)
    )

    renderNoticias(filtradas)
}

/* ABRIR */
function abrirNoticia(id){
    if(id) window.location.href = "noticia.html?id=" + id
}

document.addEventListener("DOMContentLoaded", carregarNoticias);
</script>

</body>
</html>
