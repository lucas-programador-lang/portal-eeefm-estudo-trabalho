<header>

<div class="container">

<h2 style="margin-top:40px;">Painel do Professor</h2>


<h3 style="margin-top:30px;">Registrar Nota</h3>

<form onsubmit="registrarNota(event)">

<input
type="number"
id="idAluno"
placeholder="ID do aluno"
required
>

<input
type="text"
id="disciplinaNota"
placeholder="Disciplina"
required
>

<input
type="number"
step="0.1"
id="notaAluno"
placeholder="Nota"
required
>

<button type="submit">Registrar Nota</button>

</form>



<h3 style="margin-top:40px;">Turmas</h3>

<table>

<tr>
<th>Turma</th>
<th>Disciplina</th>
</tr>

<tr>
<td>1º Ano A</td>
<td>Matemática</td>
</tr>

<tr>
<td>2º Ano B</td>
<td>Português</td>
</tr>

</table>

</div>

</body>

</html>
