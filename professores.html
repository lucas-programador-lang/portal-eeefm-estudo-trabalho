<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Professor</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f172a;
color:white;
}

/* CONTAINER */
.container-box{
max-width:900px;
margin:40px auto;
background:#020617;
padding:30px;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* TABELA */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0ea5e9;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #1e293b;
}

/* FORM */
input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:white;
}

button{
margin-top:10px;
padding:12px;
background:#0ea5e9;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

/* TROCAR SENHA */
.trocar-senha-box{
max-width:400px;
margin:20px auto;
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
display:none;
}

</style>

</head>

<body>

<div class="container-box">

<h2>👨‍🏫 Painel do Professor</h2>

<h3 style="margin-top:20px;">Alunos</h3>

<table id="tabelaAlunos"></table>

<h3 style="margin-top:30px;">Registrar Nota</h3>

<form onsubmit="registrarNota(event)">

<input type="number" id="idAluno" placeholder="ID do aluno" required>
<input type="text" id="disciplinaNota" placeholder="Disciplina" required>
<input type="number" step="0.1" id="notaAluno" placeholder="Nota" required>

<button type="submit">Salvar Nota</button>

</form>

<button onclick="abrirTrocarSenha()" style="margin-top:20px;">
🔒 Trocar senha
</button>

<button onclick="logout()">
🚪 Sair
</button>

</div>

<div class="trocar-senha-box" id="trocarSenhaBox">

<h3>Alterar Senha</h3>

<input type="password" id="senhaAtual" placeholder="Senha atual">
<input type="password" id="novaSenha" placeholder="Nova senha">

<button onclick="trocarSenha()">Salvar</button>

</div>

<script>

const API = "https://portal-escola-backend.onrender.com"

function getToken(){
return localStorage.getItem("token")
}

function logout(){
localStorage.clear()
window.location="login-professor.html"
}

if(!getToken()){
logout()
}

/* =========================
CARREGAR ALUNOS
========================= */

async function carregarAlunos(){

let tabela=document.getElementById("tabelaAlunos")

try{

let res=await fetch(API+"/alunos",{
headers:{ Authorization:"Bearer "+getToken() }
})

let alunos=await res.json()

tabela.innerHTML=`
<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
</tr>
`

alunos.forEach(a=>{
tabela.innerHTML+=`
<tr>
<td>${a.id}</td>
<td>${a.nome}</td>
<td>${a.cpf}</td>
</tr>
`
})

}catch{
alert("Erro ao carregar alunos")
}

}

/* =========================
REGISTRAR NOTA
========================= */

async function registrarNota(e){

e.preventDefault()

let aluno_id=document.getElementById("idAluno").value
let disciplina=document.getElementById("disciplinaNota").value
let nota=document.getElementById("notaAluno").value

let res=await fetch(API+"/nota",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+getToken()
},
body:JSON.stringify({aluno_id,disciplina,nota})
})

let data=await res.json()

if(data.success){
alert("Nota salva")
e.target.reset()
}else{
alert("Erro ao salvar")
}

}

/* =========================
TROCAR SENHA
========================= */

function abrirTrocarSenha(){
let box=document.getElementById("trocarSenhaBox")
box.style.display = box.style.display==="block" ? "none":"block"
}

async function trocarSenha(){

let senhaAtual=document.getElementById("senhaAtual").value
let novaSenha=document.getElementById("novaSenha").value

let usuario=JSON.parse(localStorage.getItem("usuario") || "{}")

let res=await fetch(API+"/trocar-senha",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
cpf:usuario.cpf,
senhaAtual,
novaSenha,
tipo:"professor"
})
})

let data=await res.json()

if(data.success){
alert("Senha alterada")
document.getElementById("trocarSenhaBox").style.display="none"
}else{
alert("Erro na senha")
}

}

window.onload = carregarAlunos

</script>

</body>
</html>
