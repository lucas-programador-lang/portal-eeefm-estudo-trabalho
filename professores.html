<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Professor</title>

<link rel="stylesheet" href="style.css">

<style>
/* Mantendo 100% da sua estrutura original de CSS */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;}

/* HEADER */
.header-comum{
position:fixed;
top:0;
left:0;
width:100%;
background:#020617;
border-bottom:1px solid #1e293b;
z-index:999;
}

.header-comum .container{
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:50px;
}

.logo strong{
color:#38bdf8;
}

/* CONTAINER */
.main-container{
max-width:900px;
margin:120px auto 40px auto;
padding:20px;
background:#020617;
border-radius:12px;
border:1px solid #1e293b;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* TABELA */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0ea5e9;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #1e293b;
}

/* FORM */
input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #1e293b;
background:#0f172a;
color:white;
}

button{
margin-top:10px;
padding:12px;
background:#0ea5e9;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

button:hover{
background:#0284c7;
}

/* TROCAR SENHA */
.trocar-senha-box{
max-width:400px;
margin:20px auto;
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
display:none;
}
</style>
</head>

<body>

<header class="header-comum">
<div class="container">
<div class="logo">
<img src="logo.png" alt="Logo Escola">
<strong>EEEFM Estudo e Trabalho</strong>
</div>
</div>
</header>

<div class="main-container">

<h2>👨‍🏫 Painel do Professor</h2>

<h3 style="margin-top:20px;">Alunos</h3>
<table id="tabelaAlunos"></table>

<h3 style="margin-top:30px;">Registrar Nota</h3>

<form id="formNota" onsubmit="registrarNota(event)">
<input type="number" id="idAluno" placeholder="ID do aluno" required>
<input type="text" id="disciplinaNota" placeholder="Disciplina" required>
<input type="number" step="0.1" id="notaAluno" placeholder="Nota" required>
<button type="submit">Salvar Nota</button>
</form>

<div style="margin-top:20px;">
<button onclick="abrirTrocarSenha()">🔒 Trocar senha</button>
<button onclick="logout()">🚪 Sair</button>
</div>

</div>

<div class="trocar-senha-box" id="trocarSenhaBox">
<h3>Alterar Senha</h3>
<input type="password" id="senhaAtual" placeholder="Senha atual">
<input type="password" id="novaSenha" placeholder="Nova senha">
<button onclick="trocarSenha()">Salvar</button>
</div>

<script>
const API="https://portal-escola-backend.onrender.com"

function getToken(){
return localStorage.getItem("token")
}

function logout(){
localStorage.clear()
window.location.href="login-professor.html"
}

// Verificação imediata de acesso
if(!getToken()){
logout()
}

/* CARREGAR ALUNOS */
async function carregarAlunos(){
let tabela=document.getElementById("tabelaAlunos")
if(!tabela) return;

try{
let res=await fetch(API+"/alunos",{
headers:{Authorization:"Bearer "+getToken()}
})

if(res.status === 401) { logout(); return; }

let alunos=await res.json()

tabela.innerHTML=`
<tr>
<th>ID</th>
<th>Nome</th>
<th>CPF</th>
</tr>
`

if(Array.isArray(alunos)){
    alunos.forEach(a=>{
    tabela.innerHTML+=`
    <tr>
    <td>${a.id}</td>
    <td>${a.nome}</td>
    <td>${a.cpf}</td>
    </tr>
    `
    })
} else {
    tabela.innerHTML += `<tr><td colspan="3">Nenhum aluno encontrado.</td></tr>`;
}

}catch(err){
console.error(err)
alert("Erro ao carregar lista de alunos")
}
}

/* REGISTRAR NOTA */
async function registrarNota(e){
e.preventDefault()

let aluno_id=document.getElementById("idAluno").value
let disciplina=document.getElementById("disciplinaNota").value
let nota=document.getElementById("notaAluno").value

try {
    let res=await fetch(API+"/nota",{
    method:"POST",
    headers:{
    "Content-Type":"application/json",
    Authorization:"Bearer "+getToken()
    },
    body:JSON.stringify({aluno_id,disciplina,nota})
    })

    let data=await res.json()

    if(data.success){
    alert("✅ Nota salva com sucesso!")
    e.target.reset()
    }else{
    alert(data.erro || "Erro ao salvar nota")
    }
} catch (err) {
    alert("Erro de conexão com o servidor ao salvar nota")
